<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧カードゲーム（プロトタイプ）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f2eb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #8a1c14;
            border-bottom: 3px double #8a1c14;
            padding-bottom: 10px;
        }
        .intro {
            max-width: 600px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .game-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .hint-box {
            background-color: #fbf9f5;
            border: 2px solid #8a1c14;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            background-color: #e6dfd3;
            border: 1px solid #bcaf9b;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #8a1c14;
            color: white;
            border-color: #8a1c14;
        }
        .score {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .result-message {
            margin-top: 10px;
            font-weight: bold;
            height: 20px;
        }
    </style>
</head>
<body>

    <h1>国語便覧カードゲーム</h1>
    <p class="intro">国語便覧に載っている文豪の「エピソード」や「作品」をヒントに、正しい文豪カードを場から選べ！</p>

    <div class="game-container">
        <div id="hint-type" style="font-size: 0.9em; color: #666; margin-bottom: 5px;">【お題】</div>
        <div class="hint-box" id="hint-text">読み込み中...</div>
        
        <div class="options" id="options-container">
            </div>

        <div class="result-message" id="result-text"></div>
        <div class="score">スコア: <span id="score-val">0</span> / <span id="total-val">0</span></div>
    </div>

    <script>
        // カードデータ（国語便覧風）
        const bungoData = [
            { name: "太宰治", hint: "「恥の多い生涯を送って来ました」で始まる『人間失格』の著者。心中未遂を繰り返した。" },
            { name: "夏目漱石", hint: "イギリス留学で神経衰弱になる。『吾輩は猫である』で一躍有名に。「月が綺麗ですね」の逸話も。" },
            { name: "芥川龍之介", hint: "『羅生門』『鼻』の著者。ぼんやりとした不安を理由に35歳で早世。彼の名を冠した文学賞がある。" },
            { name: "中島敦", hint: "『山月記』の著者。喘息のため33歳で早世。国語の教科書で虎になる男といえばこの人。" },
            { name: "森鴎外", hint: "小説家でありながら、本職は「軍医（陸軍軍医総監）」。代表作は『舞姫』『高瀬舟』。" },
            { name: "宮沢賢治", hint: "岩手県出身。農業指導をしながら『銀河鉄道の夜』や『注文の多い料理店』を執筆した。" }
        ];

        let currentQuestion = {};
        let score = 0;
        let total = 0;

        function nextQuestion() {
            document.getElementById('result-text').innerText = "";
            
            // 正解をランダムに決定
            const correctAns = bungoData[Math.floor(Math.random() * bungoData.length)];
            currentQuestion = correctAns;

            // お題をセット
            document.getElementById('hint-text').innerText = correctAns.hint;

            // 選択肢（4つ）を作成
            let choices = [correctAns.name];
            while (choices.length < 4) {
                let randomName = bungoData[Math.floor(Math.random() * bungoData.length)].name;
                if (!choices.includes(randomName)) {
                    choices.push(randomName);
                }
            }

            // 選択肢をシャッフル
            choices.sort(() => Math.random() - 0.5);

            // ボタンを画面に配置
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => checkAnswer(name);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedName) {
            total++;
            const resultText = document.getElementById('result-text');
            if (selectedName === currentQuestion.name) {
                score++;
                resultText.innerText = "正解！ 🎴";
                resultText.style.color = "green";
            } else {
                resultText.innerText = `残念！正解は「${currentQuestion.name}」`;
                resultText.style.color = "#8a1c14";
            }

            document.getElementById('score-val').innerText = score;
            document.getElementById('total-val').innerText = total;

            // 1.5秒後に次の問題へ
            setTimeout(nextQuestion, 1500);
        }

        // 初回スタート
        nextQuestion();
    </script>
</body>
</html>
