            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })

                const data = await res.json();

            { hint: "『蒲団』の著者。自らの私生活を告白する形式（私小説）の源流となった自然主義作家。", ans: "田山花袋" },
            { hint: "『青い山脈』『石中先生行状記』の著者。戦後の明るい民主主義文学をリードした。", ans: "石坂洋次郎" },
            { hint: "『恩讐の彼方に』『父帰る』の著者。文藝春秋を創設し芥川賞・直木賞を設立した。", ans: "菊池寛" },
            { hint: "『友情』『その妹』の著者。白樺派の中心人物で人道主義的な思想を持っていた。", ans: "武者小路実篤" },
            { hint: "『風立ちぬ』『菜穂子』の著者。堀辰雄が師事した、精神的な深みを持つ文豪。", ans: "堀辰雄" },
            { hint: "『氷壁』『敦煌』『天平の甍』の著者。歴史小説や近代の山岳小説で知られる。", ans: "井上靖" },
            { hint: "『太陽の季節』の著者。戦後日本の若者の既成モラルへの反抗を描き「太陽族」と呼ばれた。", ans: "石原慎太郎" },
            { hint: "『山の音』『千羽鶴』の著者。新感覚派の代表であり、幽玄の美の世界を描いた。", ans: "川端康成" },
            { hint: "『斜陽』がベストセラーとなり、没落していく上流階級の人々を指す言葉の語源となった文豪。", ans: "太宰治" },
            { hint: "『小説の神様』と慕われ、極限まで無駄を削ぎ落とした簡潔で力強い文体を持つ作家。", ans: "志賀直哉" },
            { hint: "『藪の中』の著者。一つの事件を巡り複数の目撃者が矛盾した証言をする、現代でも多用されるプロットの生みの親。", ans: "芥川龍之介" },
            { hint: "『坊っちゃん』の舞台であり、夏目漱石自身が英語教師として赴任していた愛媛県の都市。", ans: "松山市" },
            { hint: "『五重塔』を著し、当時の幸田露伴の文学的ポジションを尾崎紅葉と並べて「○露時代」という。", ans: "紅" },
            { hint: "『細雪』の舞台。谷崎潤一郎が関東大震災を機に移住し、多大な影響を受けた日本の地域。", ans: "関西" }
        ];

        let player = null, enemy = null, isOnlineMode = false, currentRoomId = "", playerRole = "", isGameover = false;
        let selectedBungoIndex = 0, currentQuiz = null, onlineSyncTimer = null;

        function goToSelectScreen(online) {
            isOnlineMode = online;
            document.getElementById('rules-screen').style.display = "none";
            document.getElementById('character-select').style.display = "block";
            document.getElementById('online-setup').style.display = online ? "flex" : "none";
            createSelectScreen();
        }

        function createSelectScreen() {
            const grid = document.getElementById('select-grid-container');
            grid.innerHTML = "";
            bungoData.forEach((bungo, index) => {
                const btn = document.createElement('button');
                btn.className = "select-card-btn";
                if(isOnlineMode && selectedBungoIndex === index) btn.style.borderColor = "#00ffcc";
                btn.innerHTML = `
                    <div class="select-name">${bungo.name}</div>
                    <div class="select-stats">HP: ${bungo.hp} / ATK: ${bungo.atk}</div>
                    <div class="select-ability">⚡ ${bungo.abName}</div>
                `;
                btn.onclick = () => {
                    selectedBungoIndex = index;
                    if(!isOnlineMode) startOfflineGame(index);
                    else createSelectScreen();
                };
                grid.appendChild(btn);
            });
        }

        function startOfflineGame(index) {
            player = { ...bungoData[index] };
            enemy = { ...bungoData[(index + 1) % bungoData.length], name: "CPU" };
            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            updateDisplay(); nextTurn();
        }

        // 🌐 オンラインゲーム開始
        async function startOnlineGame(role) {
            const roomNum = document.getElementById('room-input').value;
            if(!roomNum) { alert("部屋番号を入力してね"); return; }
            currentRoomId = "room_" + roomNum;
            playerRole = role;
            player = { ...bungoData[selectedBungoIndex] };
            isGameover = false;

            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            document.getElementById('log-text').innerText = "対戦相手の入室を待っています...";

            if(role === 'host') {
                await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "DELETE" });
                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        id: currentRoomId,
                        h_name: player.name,
                        h_ab: `${player.hp}_${player.atk}_${player.abName}`,
                        g_name: "待機中...",
                        g_ab: "0_0_-",
                        last_action: "ホスト入室"
                    })
                });
                enemy = { name: "待機中...", hp: 100, atk: 0, abName: "-" };
            } else {
                const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
                const rooms = await res.json();
                if(!rooms || rooms.length === 0) { alert("部屋が見つかりません"); location.reload(); return; }
                
                const room = rooms[0];
                const hData = room.h_ab.split('_');
                enemy = { name: room.h_name, hp: parseInt(hData[0]), atk: parseInt(hData[1]), abName: hData[2] };

                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        id: currentRoomId,
                        h_name: room.h_name, h_ab: room.h_ab,
                        g_name: player.name,
                        g_ab: `${player.hp}_${player.atk}_${player.abName}`,
                        last_action: "ゲスト入室"
                    }),
                    headers: { "Prefer": "resolution=merge-duplicates" }
                });
            }

            updateDisplay();
            nextTurn();
            onlineSyncTimer = setInterval(syncOnlineData, 1200); 
        }

        // 🔄 リアルタイムHP・攻撃同期
        async function syncOnlineData() {
            if(isGameover || !isOnlineMode) return;

            const myStatusStr = `${player.hp}_${player.atk}_${player.abName}`;
            const payload = playerRole === 'host' ? { h_ab: myStatusStr } : { g_ab: myStatusStr };
            
            const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
            const rooms = await res.json();
            
            if(rooms && rooms.length > 0) {
                const room = rooms[0];
                
                if(playerRole === 'host') {
                    const gData = room.g_ab.split('_');
                    if(room.g_name !== "待機中...") {
                        enemy.name = room.g_name;
                        enemy.hp = parseInt(gData[0]);
                        enemy.atk = parseInt(gData[1]);
                        enemy.abName = gData[2];
                    }
                    const hData = room.h_ab.split('_');
                    player.hp = parseInt(hData[0]);
                } else {
                    const hData = room.h_ab.split('_');
                    enemy.name = room.h_name;
                    enemy.hp = parseInt(hData[0]);
                    enemy.atk = parseInt(hData[1]);
                    enemy.abName = hData[2];
                    
                    const gData = room.g_ab.split('_');
                    player.hp = parseInt(gData[0]);
                }
            }

            await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
            updateDisplay();
            checkBattleOver();
        }

        function updateDisplay() {
            if(!player || !enemy) return;
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-hp-display').innerText = `HP: ${Math.max(0, player.hp)}`;
            document.getElementById('p-atk-display').innerText = `ATK: ${player.atk}`;
            document.getElementById('p-ability-name').innerText = `⚡ ${player.abName}`;

            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-hp-display').innerText = `HP: ${Math.max(0, enemy.hp)}`;
            document.getElementById('e-atk-display').innerText = enemy.atk ? `ATK: ${enemy.atk}` : "ATK: --";
            document.getElementById('e-ability-name').innerText = `⚡ ${enemy.abName}`;
        }

        function nextTurn() {
            if(isGameover) return;
            currentQuiz = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById('hint-text').innerText = currentQuiz.hint;

            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            let choices = [currentQuiz.ans];
            while(choices.length < 4) {
                let rBungo = bungoData[Math.floor(Math.random() * bungoData.length)];
                if(!choices.includes(rBungo.name)) choices.push(rBungo.name);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => handleAnswer(name);
                container.appendChild(btn);
            });
        }

        // ⚔️ ダメージ処理ロジックの完全連動
        async function handleAnswer(selectedName) {
            if(isGameover) return;
            if(isOnlineMode && enemy.hp <= 0) return;

            const log = document.getElementById('log-text');

            if(selectedName === currentQuiz.ans) {
                // ⭕正解！相手のHPを直接減らして同期パケットを飛ばす！
                enemy.hp = Math.max(0, enemy.hp - player.atk);
                log.innerText = `⭕正解！相手の ${enemy.name} に ${player.atk} ダメージ！`;
                log.style.color = "#00ffcc";

                if(isOnlineMode) {
                    const enemyStatusStr = `${enemy.hp}_${enemy.atk}_${enemy.abName}`;
                    const payload = playerRole === 'host' ? { g_ab: enemyStatusStr, last_action: "H_ATTACK" } : { h_ab: enemyStatusStr, last_action: "G_ATTACK" };
                    await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
                }
            } else {
                // ❌不正解！ペナルティ（誤答反撃ダメージ）
                let penaltyDmg = isOnlineMode ? (enemy.atk || 30) : 30;
                player.hp = Math.max(0, player.hp - penaltyDmg);
                log.innerText = `❌不正解… 正解は【${currentQuiz.ans}】。誤答反撃で ${penaltyDmg} ダメージを受けた！`;
                log.style.color = "#ff4d4d";

                if(isOnlineMode) {
                    const myStatusStr = `${player.hp}_${player.atk}_${player.abName}`;
                    const payload = playerRole === 'host' ? { h_ab: myStatusStr, last_action: "H_MISS" } : { g_ab: myStatusStr, last_action: "G_MISS" };
                    await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
                }
            }

            updateDisplay();
            if(!checkBattleOver()) {
                setTimeout(nextTurn, 1400);
            }
        }

        function checkBattleOver() {
            if(isGameover) return true;
            const log = document.getElementById('log-text');

            if(enemy.hp <= 0 && enemy.name !== "待機中...") {
                isGameover = true; clearInterval(onlineSyncTimer);
                log.innerText = `🎉 勝負あり！対戦相手の ${enemy.name} を撃破しました！あなたの勝利です！`;
                log.style.color = "#dab358"; showResetButton(); return true;
            } else if(player.hp <= 0) {
                isGameover = true; clearInterval(onlineSyncTimer);
                log.innerText = `💀 勝負あり！あなたの ${player.name} は倒れました… 敗北です。`;
                log.style.color = "#ff4d4d"; showResetButton(); return true;
            }
            return false;
        }

        function showResetButton() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const rBtn = document.createElement('button');
            rBtn.className = "btn"; rBtn.style.gridColumn = "span 2"; rBtn.style.backgroundColor = "#dab358"; rBtn.style.color = "black";
            rBtn.innerText = "タイトルに戻る";
            rBtn.onclick = () => location.reload();
            container.appendChild(rBtn);
        }
    </script>
</body>
</html>
