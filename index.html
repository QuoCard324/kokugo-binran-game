<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトルカードゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #dab358;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .rules-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 10px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: block;
        }
        .rules-content {
            text-align: left;
            line-height: 1.6;
            font-size: 0.95em;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .rules-content h3 {
            color: #dab358;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            margin-top: 20px;
        }
        .rules-content ul {
            padding-left: 20px;
        }
        .highlight-text { color: #00ffcc; font-weight: bold; }
        .danger-text { color: #ff4d4d; font-weight: bold; }
        .start-nav-btn {
            background: linear-gradient(135deg, #dab358, #b08b35);
            color: black;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(218, 179, 88, 0.3);
        }
        .select-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 10px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: none;
        }
        .select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .select-card-btn {
            background: linear-gradient(135deg, #3a3a3a, #222);
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: left;
        }
        .select-card-btn:hover { border-color: #dab358; }
        .select-name { font-size: 1.1em; font-weight: bold; color: #dab358; }
        .select-stats { font-size: 0.85em; color: #ccc; margin: 3px 0; }
        .select-ability { font-size: 0.75em; color: #00ffcc; background-color: #111; padding: 4px; border-radius: 4px; }
        .battle-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        .battle-field { display: flex; justify-content: space-around; width: 100%; max-width: 700px; margin-bottom: 20px; }
        .card {
            background: linear-gradient(135deg, #2c2c2c, #111);
            border: 3px solid #dab358;
            border-radius: 10px;
            width: 150px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .card.enemy { border-color: #c93a3a; }
        .card-name { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .stat { font-size: 1em; margin: 5px 0; font-weight: bold; }
        .hp { color: #ff4d4d; }
        .atk { color: #ffb300; }
        .ability-badge { font-size: 0.75em; color: #00ffcc; margin-top: 8px; border: 1px dashed #00ffcc; padding: 2px; border-radius: 4px; }
        .quiz-container {
            background-color: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .hint-box {
            background-color: #222;
            border-left: 5px solid #dab358;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            font-size: 1em;
            line-height: 1.5;
            text-align: left;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        .btn:hover { background-color: #dab358; color: black; border-color: #dab358; }
        .log {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1em;
            min-height: 70px;
            color: #00ffcc;
            line-height: 1.4;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>国語便覧 文豪バトル</h1>
    <p class="subtitle">正しい知識を選び、特殊能力で勝利を掴め！</p>

    <div id="rules-screen" class="rules-container">
        <h2>📜 対戦ルール説明</h2>
        <div class="rules-content">
            <h3>⚔️ 基本ルール</h3>
            <ul>
                <li>出題されるお題を読み、正しい文豪の名前を4択から選んでください。</li>
                <li><span class="highlight-text">正解時</span>：自身のATKで相手にダメージを与えます。</li>
                <li><span class="danger-text">⚠️ 敵のリアルタイム自動攻撃</span>：敵はクイズに関係なく、<span class="danger-text">5秒ごとに自動攻撃</span>してきます！</li>
                <li><span class="danger-text">不正解時</span>：ペナルティとして、即座に敵から反撃ダメージを受けます。</li>
            </ul>
        </div>
        <button class="start-nav-btn" onclick="goToSelectScreen()">ゲームスタート（文豪を選ぶ）</button>
    </div>

    <div id="character-select" class="select-container">
        <h2>出陣する文豪を選択（総勢20名）</h2>
        <div class="select-grid" id="select-grid-container"></div>
    </div>

    <div id="battle-screen" class="battle-container">
        <div class="battle-field">
            <div class="card">
                <div style="font-size:0.8em; color:#aaa;">味方</div>
                <div class="card-name" id="p-name">???</div>
                <div class="stat hp">HP: <span id="p-hp">0</span></div>
                <div class="stat atk">ATK: <span id="p-atk">0</span></div>
                <div class="ability-badge" id="p-ability-name">-</div>
            </div>
            <div style="font-size: 2em; align-self: center; color: #dab358;">VS</div>
            <div class="card enemy">
                <div style="font-size:0.8em; color:#aaa;">敵</div>
                <div class="card-name" id="e-name">???</div>
                <div class="stat hp">HP: <span id="e-hp">0</span></div>
                <div class="stat atk">ATK: <span id="e-atk">0</span></div>
                <div class="ability-badge" id="e-ability-name">-</div>
            </div>
        </div>
        <div class="quiz-container">
            <div class="hint-box" id="hint-text"></div>
            <div class="options" id="options-container"></div>
            <div class="log" id="log-text"></div>
        </div>
    </div>

    <script>
        // クイズ問題用：全35名のデータ
        const bungoData = [
            // キャラ選択に残す14名（元のメインキャラから厳選）
            { name: "太宰治", hp: 240, maxHp: 240, atk: 35, hint: "『人間失格』『走れメロス』の著者。心中未遂を繰り返し、39歳で玉川上水にて入水。", abName: "人間失格", abDesc: "HP半分以下でATK1.3倍", isPlayable: true },
            { name: "夏目漱石", hp: 360, maxHp: 360, atk: 25, hint: "『吾輩は猫である』『こころ』の著者。千円札の肖像でも有名。イギリス留学で神経衰弱に。", abName: "月が綺麗ですね", abDesc: "正解時25%でHP30回復", isPlayable: true },
            { name: "芥川龍之介", hp: 200, maxHp: 200, atk: 40, hint: "『羅生門』『蜘蛛の糸』の著者。「ぼんやりとした不安」を理由に自ら命を絶った天才短編作家。", abName: "蜘蛛の糸", abDesc: "被弾時、敵HPを10奪う", isPlayable: true },
            { name: "中島敦", hp: 300, maxHp: 300, atk: 30, hint: "『山月記』『李陵』の著者。自尊心と羞恥心によって虎に変貌してしまう男を描いた。", abName: "月下獣", abDesc: "最初の正解時のみ攻撃力2倍", isPlayable: true },
            { name: "森鴎外", hp: 320, maxHp: 320, atk: 28, hint: "『舞姫』『高瀬舟』の著者。小説家であり、陸軍軍医総監（軍医のトップ）という本職を持っていた。", abName: "舞姫", abDesc: "20%で敵攻撃を完全回避", isPlayable: true },
            { name: "宮沢賢治", hp: 280, maxHp: 280, atk: 32, hint: "『銀河鉄道の夜』『注文の多い料理店』の著者。地質調査や農業指導に奔走した岩手生まれの詩人。", abName: "雨ニモマケズ", abDesc: "受けるダメージを常に5軽減", isPlayable: true },
            { name: "鴨長明", hp: 220, maxHp: 220, atk: 38, hint: "「ゆく河の流れは絶えずして…」で知られる鎌倉時代の代表的な随筆『方丈記』の著者。", abName: "無常観", abDesc: "5連正解で敵ATKを永久半減", isPlayable: true },
            { name: "重松清", hp: 320, maxHp: 320, atk: 26, hint: "現代の作家。『ナイフ』『エイジ』『とんび』など、現代のいじめや家族の葛藤をリアルに描く。", abName: "親心のバリア", abDesc: "開始時に耐久40のシールド", isPlayable: true },
            { name: "鷺沢萠", hp: 260, maxHp: 260, atk: 34, hint: "現役女子大生作家として注目され『川べりの道』や『駆ける少年』を発表。若者の孤独を描いた。", abName: "駆ける衝動", abDesc: "毎ターン終了時敵に10ダメージ", isPlayable: true },
            
            // 追加分からキャラ選択に残す6名（3名非表示化）
            { name: "永井荷風", hp: 310, maxHp: 310, atk: 27, hint: "耽美派の作家。フランス・アメリカ留学を経て、江戸情緒や花柳界を描いた『濹東綺譚』を残す。", abName: "断腸亭日乗", abDesc: "毎ターン敵のHPを5吸収", isPlayable: true },
            { name: "野間宏", hp: 300, maxHp: 300, atk: 29, hint: "第一次戦後派の作家。自身の軍隊経験を基に、抑圧された人間の心理を克明に描いた『真空地帯』が代表作。", abName: "真空地帯", abDesc: "HPが30%以下になるとATKが1.4倍", isPlayable: true },
            { name: "安部公房", hp: 330, maxHp: 330, atk: 26, hint: "前衛文学の旗手。砂の穴の底に閉じ込められた男の不条理を描いた『砂の女』や『箱男』で世界的に評価された。", abName: "砂の壁", abDesc: "クイズ不正解時の敵の反撃を完全無効化", isPlayable: true },
            { name: "井上靖", hp: 350, maxHp: 350, atk: 26, hint: "歴史小説の大家。シルクロードや仏教を題材にした『天平の獍』『敦煌』や、自伝的小説『しろばんば』が有名。", abName: "天平の甍", abDesc: "3連正解で自身のHPを40回復", isPlayable: true },
            { name: "三浦哲郎", hp: 310, maxHp: 310, atk: 29, hint: "純文学作家。兄姉が次々と失踪・自殺した自身の悲劇的な家系を見つめ、ひたむきな愛を描いた『忍ぶ川』で芥川賞。", abName: "忍ぶ川の情愛", abDesc: "HPが50以下になると一度だけHPが40回復", isPlayable: true },
            { name: "開高健", hp: 300, maxHp: 300, atk: 32, hint: "ルポルタージュ作家。ベトナム戦争の最前線に従軍した経験を描いた『輝ける闇』や、壮大な釣りエッセイで知られる。", abName: "熱き輝ける闇", abDesc: "正解時、15%の確率で敵に2倍ダメージ", isPlayable: true },
            { name: "遠藤周作", hp: 340, maxHp: 340, atk: 25, hint: "キリスト教作家。江戸時代のキリシタン弾圧と信者の苦悩、神の沈黙を描いた名作『沈黙』の著者。", abName: "大いなる沈黙", abDesc: "受けるすべてのダメージを常に15%カット", isPlayable: true },
            { name: "大江健三郎", hp: 270, maxHp: 270, atk: 36, hint: "1994年ノーベル文学賞受賞。障害を持つ息子との生を描いた『個人的な体験』や『万延元年のフットボール』を執筆。", abName: "個人的な神話", abDesc: "クイズに正解する度に、自身のATKが3ずつ上昇", isPlayable: true },
            { name: "幸田文", hp: 330, maxHp: 330, atk: 26, hint: "幸田露伴の娘。父の厳しい躾や死を綴った随筆や、芸者置屋の日常を緻密に描いた小説『流れる』で知られる。", abName: "凛々しき流れる", abDesc: "敵の自動攻撃を受けた際、15%の確率で無効化", isPlayable: true },
            { name: "星新一", hp: 260, maxHp: 260, atk: 30, hint: "「ショートショートの神様」。生涯に1000編以上の超短編SFを残す。代表作に『ボッコちゃん』など。", abName: "おせっかいな宇宙人", abDesc: "毎ターンATKが15〜45の間でランダムに変動", isPlayable: true },
            { name: "浅田次郎", hp: 330, maxHp: 330, atk: 28, hint: "「平成の泣かせ屋」。鉄道員の老境と奇跡を描いた『鉄道員（ぽっぽや）』や、中国の歴史巨編『蒼穹の昴』の著者。", abName: "ぽっぽやの奇跡", abDesc: "HPが0になるダメージを受けた時、一度だけHP1で耐える", isPlayable: true },
            
            // 【今回「問題専用」に変更した3名】
            { name: "梅崎春生", hint: "戦後派作家。特攻基地の暗号兵としての張り詰めた日常と人間のエゴを描いた『桜島』や『日の果て』で有名。", isPlayable: false },
            { name: "梶井基次郎", hint: "短編の名手。肺結核に苦しみながら、丸善の棚の洋書の上にレモンを置いて去る心理を描いた『檸檬』が有名。", isPlayable: false },
            { name: "三島由紀夫", hint: "『仮面の告白』『金閣寺』の著者。完璧な言語美と肉体美を追求し、最後は市ヶ谷の自衛隊駐屯地で自決。", isPlayable: false },

            // 【前回までに「問題専用」にした12名】
            { name: "安岡章太郎", hint: "「第三の新人」の代表格。自身の劣等感や、没落していく家庭の姿をユーモラスかつ冷徹に描いた『悪い仲間』『海辺の光景』など。", isPlayable: false },
            { name: "井上ひさし", hint: "劇作家・小説家。東北の架空の村が独立を宣言する『吉里吉里人』や、言葉遊びを駆使した劇作『父と暮せば』など。", isPlayable: false },
            { name: "大岡昇平", hint: "戦後派の重鎮。レイテ島での捕虜経験を基にした『俘虜記』や、極限状態での人肉食を扱った『野火』が代表作。", isPlayable: false },
            { name: "原民喜", hint: "詩人・小説家。広島での被爆体験をリアルかつ痛切に描いた原爆文学の金字塔『夏の花』の著者。", isPlayable: false },
            { name: "谷崎潤一郎", hint: "耽美派の巨匠。『痴人の愛』『春琴抄』『細雪』の著者。女性崇拝や伝統的な日本語の美を追求した。", isPlayable: false },
            { name: "井伏鱒二", hint: "『山椒魚』や、原爆の悲劇を描いた『黒い雨』の著者。ユーモアと庶民的な温かみのある文体が特徴。", isPlayable: false },
            { name: "川上弘美", hint: "年の離れた元教師との恋を浮遊感のある文体で描いた『センセイの鞄』や、芥川賞受賞作『蛇を踏む』の著者。", isPlayable: false },
            { name: "江國香織", hint: "清澄な文体で、少し歪んだ幸福を描く作家。『きらきらひかる』や、直木賞受賞作『号泣する準備はできていた』など。", isPlayable: false },
            { name: "山田詠美", hint: "米軍基地周辺の恋愛を描いた『ベッドタイムアイズ』や、少年少女の成長と傷を描く『風葬の教室』などの著者。", isPlayable: false },
            { name: "村上春樹", hint: "『風の歌を聴け』でデビューし、『ノルウェイの森』『海辺のカフカ』など独特の比喩と喪失感を描く世界的作家。", isPlayable: false },
            { name: "宮本輝", hint: "人間の業や生死を大河的な物語で描く作家。大阪の川べりを舞台にした『泥の河』『螢川』などの川三部作が有名。", isPlayable: false },
            { name: "向田邦子", hint: "昭和の家庭の裏に潜む人間の機微を鋭く切り取った短編集『思い出トランプ』で直木賞を受勝した脚本家・エッセイスト。", isPlayable: false }
        ];

        // キャラクター選択・敵出現はisPlayableがtrueのものだけ（計20名）
        const playableBungo = bungoData.filter(b => b.isPlayable);

        let player = null, enemy = null, currentQuizAnswer = "", isGameover = false, enemyAttackTimer = null; 
        let playerStreakCount = 0, playerShield = 0, isAtsushiTriggered = false, isChomeiTriggered = false;
        let isMishimaTriggered = false, isAsadaTriggered = false;

        function goToSelectScreen() {
            document.getElementById('rules-screen').style.display = "none";
            document.getElementById('character-select').style.display = "block";
            createSelectScreen();
        }

        function createSelectScreen() {
            const grid = document.getElementById('select-grid-container');
            grid.innerHTML = "";
            playableBungo.forEach((bungo, index) => {
                const btn = document.createElement('button');
                btn.className = "select-card-btn";
                btn.innerHTML = `
                    <div class="select-name">${bungo.name}</div>
                    <div class="select-stats">HP: ${bungo.hp} / ATK: ${bungo.atk}</div>
                    <div class="select-ability">⚡ ${bungo.abName}: ${bungo.abDesc}</div>
                `;
                btn.onclick = () => { selectCharacter(index); };
                grid.appendChild(btn);
            });
        }

        function selectCharacter(playableIndex) {
            player = { ...playableBungo[playableIndex] };
            let eIndex = Math.floor(Math.random() * playableBungo.length);
            while(playableBungo[eIndex].name === player.name) eIndex = Math.floor(Math.random() * playableBungo.length);
            enemy = { ...playableBungo[eIndex] };

            playerStreakCount = 0; playerShield = 0; isAtsushiTriggered = false; isChomeiTriggered = false; isAsadaTriggered = false; isMishimaTriggered = false;
            if (player.name === "重松清") playerShield = 40;

            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            isGameover = false;
            
            document.getElementById('log-text').innerHTML = `${player.name} VS ${enemy.name} ！ バトル開始！`;
            updateDisplay();
            nextTurn();

            if(enemyAttackTimer) clearInterval(enemyAttackTimer);
            // 自動攻撃タイマーの間隔を5000ms（5秒）に設定
            enemyAttackTimer = setInterval(enemyActiveAttack, 5000);
        }

        function enemyActiveAttack() {
            if (isGameover || !player || !enemy) return;
            const log = document.getElementById('log-text');
            let dmgLog = "", abLog = "";
            
            if (player.name === "森鴎外" && Math.random() < 0.20) {
                log.innerHTML = "【能力発動】『舞姫』! 敵の自動攻撃を完全回避！";
                return;
            }
            if (player.name === "幸田文" && Math.random() < 0.15) {
                log.innerHTML = "【能力発動】『流れる』! 敵の自動攻撃を受け流した！";
                return;
            }

            let dmg = enemy.atk;
            if (player.name === "宮沢賢治") { dmg = Math.max(1, dmg - 5); abLog += "【能力】『雨ニモマケズ』5軽減！<br>"; }
            if (player.name === "遠藤周作") { dmg = Math.floor(dmg * 0.85); abLog += "【能力】『沈黙』15%カット！<br>"; }

            if (playerShield > 0) {
                if (playerShield >= dmg) { playerShield -= dmg; dmgLog = `💥敵の自動攻撃！シールドが ${dmg} 吸収！`; } 
                else { let p = dmg - playerShield; playerShield = 0; player.hp -= p; dmgLog = `💥シールド破壊！本体に ${p} ダメージ！`; }
            } else {
                player.hp -= dmg;
                dmgLog = `💥⏳敵のリアルタイム自動攻撃！ ${dmg} ダメージ！`;
            }

            if (player.name === "芥川龍之介") { enemy.hp -= 10; player.hp = Math.min(player.maxHp, player.hp + 10); abLog += "【能力】『蜘蛛の糸』10吸収！<br>"; }

            log.innerHTML = abLog + dmgLog;
            log.style.color = "#ff4d4d";
            updateDisplay();
            checkBattleOver();
        }

        function updateDisplay() {
            if (!player || !enemy) return;
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-hp').innerText = playerShield > 0 ? `${Math.max(0, player.hp)} (+${playerShield})` : Math.max(0, player.hp);
            document.getElementById('p-atk').innerText = Math.floor(player.atk);
            document.getElementById('p-ability-name').innerText = `⚡ ${player.abName}`;
            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-hp').innerText = Math.max(0, enemy.hp);
            document.getElementById('e-atk').innerText = Math.floor(enemy.atk);
            document.getElementById('e-ability-name').innerText = `⚡ ${enemy.abName}`;
        }

        function nextTurn() {
            if (isGameover) return;
            // 問題は、非表示にした全15名分を含めた全35名からランダムに出題
            const quizSource = bungoData[Math.floor(Math.random() * bungoData.length)];
            currentQuizAnswer = quizSource.name;
            document.getElementById('hint-text').innerText = quizSource.hint;

            let choices = [quizSource.name];
            while (choices.length < 4) {
                let rName = bungoData[Math.floor(Math.random() * bungoData.length)].name;
                if (!choices.includes(rName)) choices.push(rName);
            }
            choices.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = "";
            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => handleAction(name);
                container.appendChild(btn);
            });
        }

        function handleAction(selectedName) {
            if (isGameover || !player || !enemy) return;
            const log = document.getElementById('log-text');
            let actionLog = "", abLog = "";

            if (player.name === "永井荷風") { enemy.hp -= 5; player.hp = Math.min(player.maxHp, player.hp + 5); abLog += "【能力】『濹東綺譚』敵から5吸収！<br>"; }
            if (player.name === "星新一") { player.atk = Math.floor(Math.random() * 31) + 15; abLog += `【能力】ATKが ${player.atk} に変動！<br>`; }

            if (selectedName === currentQuizAnswer) {
                playerStreakCount++;
                let damage = player.atk;

                if (player.name === "太宰治" && player.hp <= (player.maxHp / 2)) { damage = Math.floor(damage * 1.3); abLog += "【能力】『人間失格』1.3倍！<br>"; }
                if (player.name === "中島敦" && !isAtsushiTriggered) { damage *= 2; isAtsushiTriggered = true; abLog += "【能力】『月下獣』2倍！<br>"; }
                if (player.name === "野間宏" && player.hp <= (player.maxHp * 0.3)) { damage = Math.floor(damage * 1.4); abLog += "【能力】『真空地帯』1.4倍！<br>"; }
                if (player.name === "大江健三郎") { player.atk += 3; abLog += "【能力】『個人的な体験』ATKが3永続上昇！<br>"; }

                enemy.hp -= damage;
                actionLog = `⭕正解！ ${damage} ダメージ！`;

                if (player.name === "夏目漱石" && Math.random() < 0.25) { player.hp = Math.min(player.maxHp, player.hp + 30); abLog += "【能力】HP30回復！<br>"; }
                if (player.name === "井上靖" && playerStreakCount % 3 === 0) { player.hp = Math.min(player.maxHp, player.hp + 40); abLog += "【能力】『敦煌』3連正解で40回復！<br>"; }
                if (player.name === "開高健" && Math.random() < 0.15) { damage *= 2; abLog += "【能力】『輝ける闇』豪快に2倍ダメージ！<br>"; }
                if (player.name === "鴨長明" && playerStreakCount === 5 && !isChomeiTriggered) { enemy.atk = Math.floor(enemy.atk / 2); isChomeiTriggered = true; abLog += "【能力】『無常観』敵ATK永久半減！<br>"; }

                log.style.color = "#00ffcc";
            } else {
                playerStreakCount = 0;
                let eDmg = enemy.atk;
                
                if (player.name === "安部公房") {
                    actionLog = `❌不正解… 正解は ${currentQuizAnswer}。しかし『砂の女』の効果で反撃を完全無効化！`;
                } else {
                    if (player.name === "森鴎外" && Math.random() < 0.20) { actionLog = `❌不正解… しかし『舞姫』で反撃を回避！`; } 
                    else {
                        if (player.name === "宮沢賢治") { eDmg = Math.max(1, eDmg - 5); abLog += "【能力】5軽減！<br>"; }
                        if (player.name === "遠藤周作") { eDmg = Math.floor(eDmg * 0.85); abLog += "【能力】15%カット！<br>"; }

                        if (playerShield > 0) {
                            if (playerShield >= eDmg) { playerShield -= eDmg; actionLog = `❌不正解… 正解は ${currentQuizAnswer}。反撃をシールドが ${eDmg} 吸収！`; } 
                            else { let p = eDmg - playerShield; playerShield = 0; player.hp -= p; actionLog = `❌シールド破損！本体に ${p} ダメージ！`; }
                        } else {
                            player.hp -= eDmg;
                            actionLog = `❌不正解… 正解は ${currentQuizAnswer}。誤答ペナルティ反撃で ${eDmg} ダメージ！`;
                        }
                        if (player.name === "芥川龍之介") { enemy.hp -= 10; player.hp = Math.min(player.maxHp, player.hp + 10); abLog += "【能力】10吸収！<br>"; }
                    }
                }
                log.style.color = "#ff4d4d";
            }

            if (player.hp <= 0 && player.name === "三浦哲郎" && !isMishimaTriggered) { player.hp = 40; isMishimaTriggered = true; abLog += "【能力】『忍ぶ川』土壇場でHP40回復！<br>"; }
            if (player.hp <= 0 && player.name === "浅田次郎" && !isAsadaTriggered) { player.hp = 1; isAsadaTriggered = true; abLog += "【能力】『鉄道員』執念でHP1で耐えた！<br>"; }

            log.innerHTML = abLog + actionLog;
            updateDisplay();

            if (!checkBattleOver()) {
                setTimeout(nextTurn, 200); 
            }
        }

        function checkBattleOver() {
            if (isGameover || !player || !enemy) return true;
            const log = document.getElementById('log-text');

            if (enemy.hp <= 0) {
                isGameover = true; if(enemyAttackTimer) clearInterval(enemyAttackTimer);
                log.innerHTML = `🎉 勝負あり！ ${enemy.name} を撃破！あなたの勝利です！`;
                log.style.color = "#dab358"; showResetButton(); return true;
            } else if (player.hp <= 0) {
                isGameover = true; if(enemyAttackTimer) clearInterval(enemyAttackTimer);
                log.innerHTML = `💀 勝負あり！ ${player.name} が倒れた… あなたの敗北です。`;
                log.style.color = "#ff4d4d"; showResetButton(); return true;
            }
            return false;
        }

        function showResetButton() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const rBtn = document.createElement('button');
            rBtn.className = "btn"; rBtn.style.gridColumn = "span 2"; rBtn.style.backgroundColor = "#dab358"; rBtn.style.color = "black";
            rBtn.innerText = "タイトルに戻る";
            rBtn.onclick = function() {
                player = null; enemy = null;
                document.getElementById('battle-screen').style.display = "none";
                document.getElementById('rules-screen').style.display = "block";
            };
            container.appendChild(rBtn);
        }
    </script>
</body>
</html>
