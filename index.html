<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトルカードゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #dab358;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        /* バトルフィールドのレイアウト */
        .battle-field {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        /* カードのデザイン */
        .card {
            background: linear-gradient(135deg, #2c2c2c, #111);
            border: 3px solid #dab358;
            border-radius: 10px;
            width: 140px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            position: relative;
        }
        .card.enemy {
            border-color: #c93a3a;
        }
        .card-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat {
            font-size: 1em;
            margin: 5px 0;
            font-weight: bold;
        }
        .hp { color: #ff4d4d; }
        .atk { color: #ffb300; }

        /* クイズエリア */
        .quiz-container {
            background-color: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .hint-box {
            background-color: #222;
            border-left: 5px solid #dab358;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            font-size: 1.1em;
            line-height: 1.5;
            text-align: left;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #dab358;
            color: black;
            border-color: #dab358;
        }
        .log {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
            min-height: 25px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>国語便覧 文豪バトル</h1>
    <p class="subtitle">正しい知識を選び、文豪の技を繰り出せ！</p>

    <div class="battle-field">
        <div class="card">
            <div style="font-size:0.8em; color:#aaa;">味方の文豪</div>
            <div class="card-name" id="p-name">???</div>
            <div class="stat hp">HP: <span id="p-hp">0</span></div>
            <div class="stat atk">ATK: <span id="p-atk">0</span></div>
        </div>

        <div style="font-size: 2em; align-self: center; color: #dab358;">VS</div>

        <div class="card enemy">
            <div style="font-size:0.8em; color:#aaa;">敵の文豪</div>
            <div class="card-name" id="e-name">???</div>
            <div class="stat hp">HP: <span id="e-hp">0</span></div>
            <div class="stat atk">ATK: <span id="e-atk">0</span></div>
        </div>
    </div>

    <div class="quiz-container">
        <div style="font-size: 0.9em; color: #aaa; margin-bottom: 5px; text-align: left;">【技の発動条件（お題）】</div>
        <div class="hint-box" id="hint-text">バトル開始中...</div>
        
        <div class="options" id="options-container"></div>
        <div class="log" id="log-text"></div>
    </div>

    <script>
        // 文豪データ（HPとATKを追加）
        const bungoData = [
            { name: "太宰治", hp: 120, atk: 35, hint: "「恥の多い生涯を送って来ました」で始まる『人間失格』の著者。心中未遂を繰り返した。" },
            { name: "夏目漱石", hp: 180, atk: 25, hint: "イギリス留学で神経衰弱になる。『吾輩は猫である』で一躍有名に。「月が綺麗ですね」の逸話も。" },
            { name: "芥川龍之介", hp: 100, atk: 40, hint: "『羅生門』『鼻』の著者。ぼんやりとした不安を理由に35歳で早世。彼の名を冠した文学賞がある。" },
            { name: "中島敦", hp: 150, atk: 30, hint: "『山月記』の著者。喘息のため33歳で早世。国語の教科書で虎になる男といえばこの人。" },
            { name: "森鴎外", hp: 160, atk: 28, hint: "小説家でありながら、本職は「軍医（陸軍軍医総監）」。代表作は『舞姫』『高瀬舟』。" },
            { name: "宮沢賢治", hp: 140, atk: 32, hint: "岩手県出身。農業指導をしながら『銀河鉄道の夜』や『注文の多い料理店』を執筆した。" }
        ];

        let player = {};
        let enemy = {};
        let currentQuizAnswer = "";
        let isGameover = false;

        // ゲームの初期化・リセット
        function initBattle() {
            isGameover = false;
            document.getElementById('log-text').innerText = "バトル開始！";

            // プレイヤーと敵をランダムに選出（重複なし）
            let pIndex = Math.floor(Math.random() * bungoData.length);
            let eIndex = Math.floor(Math.random() * bungoData.length);
            while(pIndex === eIndex) {
                eIndex = Math.floor(Math.random() * bungoData.length);
            }

            // ディープコピー（HP減少を管理するため）
            player = { ...bungoData[pIndex] };
            enemy = { ...bungoData[eIndex] };

            updateDisplay();
            nextTurn();
        }

        // 画面のHPや名前の表示を更新
        function updateDisplay() {
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-hp').innerText = Math.max(0, player.hp);
            document.getElementById('p-atk').innerText = player.atk;

            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-hp').innerText = Math.max(0, enemy.hp);
            document.getElementById('e-atk').innerText = enemy.atk;
        }

        // ターン（問題）の切り替え
        function nextTurn() {
            if (isGameover) return;

            // クイズのお題は全データからランダム
            const quizSource = bungoData[Math.floor(Math.random() * bungoData.length)];
            currentQuizAnswer = quizSource.name;
            document.getElementById('hint-text').innerText = quizSource.hint;

            // 選択肢作成
            let choices = [quizSource.name];
            while (choices.length < 4) {
                let randomName = bungoData[Math.floor(Math.random() * bungoData.length)].name;
                if (!choices.includes(randomName)) {
                    choices.push(randomName);
                }
            }
            choices.sort(() => Math.random() - 0.5);

            // ボタン生成
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => handleAction(name);
                container.appendChild(btn);
            });
        }

        // 行動処理（ボタンを押した時）
        function handleAction(selectedName) {
            if (isGameover) return;

            const log = document.getElementById('log-text');
            
            if (selectedName === currentQuizAnswer) {
                // 正解：プレイヤーの攻撃
                enemy.hp -= player.atk;
                log.innerText = `⭕正解！ ${player.name} の攻撃！ ${enemy.name} に ${player.atk} のダメージ！`;
                log.style.color = "#00ffcc";
            } else {
                // 不正解：敵の反撃
                player.hp -= enemy.atk;
                log.innerText = `❌不正解！ 正解は ${currentQuizAnswer}。 ${enemy.name} の反撃！ ${player.name} は ${enemy.atk} のダメージ！`;
                log.style.color = "#ff4d4d";
            }

            updateDisplay();

            // 勝敗判定
            if (enemy.hp <= 0) {
                isGameover = true;
                log.innerText = `🎉 勝負あり！ ${enemy.name} を撃破した！ あなたの勝利です！`;
                log.style.color = "#dab358";
                showResetButton();
            } else if (player.hp <= 0) {
                isGameover = true;
                log.innerText = `💀 勝負あり！ ${player.name} が倒れた… あなたの敗北です。`;
                log.style.color = "#ff4d4d";
                showResetButton();
            } else {
                // 誰も倒れていなければ次のターンへ
                // 連打防止のために一度ボタンを無効化するなどの簡易措置
                const buttons = document.querySelectorAll('.btn');
                buttons.forEach(b => b.disabled = true);
                setTimeout(nextTurn, 2000);
            }
        }

        function showResetButton() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const resetBtn = document.createElement('button');
            resetBtn.className = "btn";
            resetBtn.style.gridColumn = "span 2";
            resetBtn.style.backgroundColor = "#dab358";
            resetBtn.style.color = "black";
            resetBtn.innerText = "もう一度バトルする";
            resetBtn.onclick = initBattle;
            container.appendChild(resetBtn);
        }

        // 初回スタート
        initBattle();
    </script>
</body>
</html>
