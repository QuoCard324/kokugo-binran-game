<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトルカードゲーム（完全オンライン同期版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #dab358;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .auth-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-input {
            background-color: #333;
            border: 1px solid #555;
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-size: 1em;
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .auth-btn {
            background: linear-gradient(135deg, #dab358, #b08b35);
            color: black;
            border: none;
            border-radius: 5px;
            padding: 12px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .switch-auth-lnk {
            color: #00ffcc;
            font-size: 0.85em;
            cursor: pointer;
            text-decoration: underline;
        }
        .game-main-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        .rules-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 10px;
            max-width: 650px;
            width: 100%;
        }
        .mode-select-btns { display: flex; gap: 15px; margin-top: 25px; }
        .start-nav-btn {
            background: linear-gradient(135deg, #dab358, #b08b35);
            color: black;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .online-btn { background: linear-gradient(135deg, #00ffcc, #00b399); }
        .select-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 10px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            display: none;
        }
        .select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            max-height: 450px;
            overflow-y: auto;
        }
        .select-card-btn {
            background: linear-gradient(135deg, #3a3a3a, #222);
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: left;
        }
        .select-name { font-size: 1.1em; font-weight: bold; color: #dab358; }
        .select-stats { font-size: 0.85em; color: #ccc; margin: 3px 0; }
        .select-ability { font-size: 0.75em; color: #00ffcc; background-color: #111; padding: 4px; border-radius: 4px; }
        .online-setup-box {
            background-color: #1a1a1a;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .online-input {
            background-color: #333;
            border: 1px solid #dab358;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 1.1em;
            text-align: center;
            width: 200px;
        }
        .battle-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        .battle-field { display: flex; justify-content: space-around; width: 100%; max-width: 700px; margin-bottom: 20px; }
        .card {
            background: linear-gradient(135deg, #2c2c2c, #111);
            border: 3px solid #dab358;
            border-radius: 10px;
            width: 170px;
            padding: 15px;
            text-align: center;
        }
        .card-name { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .stat { font-size: 1em; margin: 5px 0; font-weight: bold; }
        .hp { color: #ff4d4d; }
        .atk { color: #ffb300; }
        .ability-badge { font-size: 0.75em; color: #00ffcc; margin-top: 8px; border: 1px dashed #00ffcc; padding: 2px; border-radius: 4px; }
        .quiz-container {
            background-color: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .hint-box {
            background-color: #222;
            border-left: 5px solid #dab358;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            font-size: 1em;
            text-align: left;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        .btn:hover { background-color: #dab358; color: black; }
        .log {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1em;
            min-height: 60px;
            color: #00ffcc;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
        }
        .user-badge {
            font-size: 0.8em;
            color: #00ffcc;
            margin-bottom: 15px;
            background-color: #222;
            padding: 5px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>国語便覧 文豪バトル</h1>
    <p class="subtitle">正しい知識を選び、特殊能力で勝利を掴め！</p>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">🔐 ログイン</h2>
        <p id="auth-msg" style="font-size:0.85em; color:#ff4d4d; margin-bottom:10px;"></p>
        <input type="email" id="auth-email" class="auth-input" placeholder="メールアドレス">
        <input type="password" id="auth-password" class="auth-input" placeholder="パスワード">
        <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">ログインする</button>
        <p><span id="auth-switch-text" class="switch-auth-lnk" onclick="toggleAuthMode()">新しくアカウントを作る（新規登録）</span></p>
    </div>

    <div id="game-main-content" class="game-main-content">
        <div class="user-badge" id="login-user-badge">ログイン中</div>

        <div id="rules-screen" class="rules-container">
            <h2>📜 対戦ルール説明</h2>
            <p>出題されるお題を読み、正しい文豪の名前を4択から選んでください。</p>
            <div class="mode-select-btns">
                <button class="start-nav-btn" onclick="goToSelectScreen(false)">👤 一人で遊ぶ</button>
                <button class="start-nav-btn online-btn" onclick="goToSelectScreen(true)">🌐 オンライン対戦</button>
            </div>
        </div>

        <div id="character-select" class="select-container">
            <h2 id="select-title">出陣する文豪を選択</h2>
            <div class="select-grid" id="select-grid-container"></div>
            
            <div id="online-setup" class="online-setup-box" style="display: none;">
                <h3>🔑 オンライン部屋設定</h3>
                <input type="number" id="room-input" class="online-input" placeholder="4桁の部屋番号">
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <button class="btn" onclick="startOnlineGame('host')">部屋を作る (先に入る)</button>
                    <button class="btn" style="background-color:#00ffcc; color:black;" onclick="startOnlineGame('guest')">部屋に入る (後から入る)</button>
                </div>
            </div>
        </div>

        <div id="battle-screen" class="battle-container">
            <div class="battle-field">
                <div class="card">
                    <div id="p-label" style="font-size:0.8em; color:#aaa;">あなた</div>
                    <div class="card-name" id="p-name">-</div>
                    <div class="stat hp" id="p-hp-display">HP: 200</div>
                    <div class="stat atk" id="p-atk-display">ATK: 30</div>
                    <div class="ability-badge" id="p-ability-name">-</div>
                </div>
                <div style="font-size: 2em; align-self: center; color: #dab358;">VS</div>
                <div class="card">
                    <div id="e-label" style="font-size:0.8em; color:#aaa;">相手</div>
                    <div class="card-name" id="e-name">待機中...</div>
                    <div class="stat hp" id="e-hp-display">HP: 200</div>
                    <div class="stat atk" id="e-atk-display">ATK: --</div>
                    <div class="ability-badge" id="e-ability-name">-</div>
                </div>
            </div>
            <div class="quiz-container">
                <div class="hint-box" id="hint-text"></div>
                <div class="options" id="options-container"></div>
                <div class="log" id="log-text"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eqqbxsiptbgxgsznuzhq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_yP1Xswfbs9_K0-1CoSimPw_p1TXzzxd";
        let currentAuthMode = "login"; 
        let loginUserToken = "";

        // 🔐 認証
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const msgElm = document.getElementById('auth-msg');
            if(!email || !password) { msgElm.innerText = "入力してください"; return; }
            msgElm.innerText = "通信中...";

            let url = `${SUPABASE_URL}/auth/v1/token?grant_type=password`; 
            if(currentAuthMode === "signup") url = `${SUPABASE_URL}/auth/v1/signup`; 

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(!res.ok) { msgElm.innerText = "認証失敗"; return; }

                if(currentAuthMode === "signup") {
                    msgElm.innerText = "アカウント作成成功！ログインしてください。"; toggleAuthMode();
                } else {
                    loginUserToken = data.access_token;
                    document.getElementById('auth-screen').style.display = "none";
                    document.getElementById('game-main-content').style.display = "flex";
                    document.getElementById('login-user-badge').innerText = `👤 ログイン中: ${data.user.email}`;
                }
            } catch(e) { msgElm.innerText = "エラー"; }
        }

        function toggleAuthMode() {
            currentAuthMode = (currentAuthMode === "login") ? "signup" : "login";
            document.getElementById('auth-title').innerText = currentAuthMode === "login" ? "🔐 ログイン" : "📝 新規登録";
        }

        async function supabaseFetch(endpoint, options = {}) {
            const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" };
            return fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { ...options, headers: { ...headers, ...options.headers } });
        }

        // 📊 文豪データ
        const bungoData = [
            { name: "太宰治", hp: 240, atk: 35, abName: "人間失格", hint: "『人間失格』『走れメロス』の著者。心中未遂を繰り返し、玉川上水にて入水。" },
            { name: "夏目漱石", hp: 360, atk: 25, abName: "こころ", hint: "『吾輩は猫である』『こころ』の著者。千円札の肖像でも有名。" },
            { name: "芥川龍之介", hp: 200, atk: 40, abName: "蜘蛛の糸", hint: "『羅生門』『蜘蛛の糸』の著者。「ぼんやりとした不安」を理由に自ら命を絶った天才短編作家。" },
            { name: "中島敦", hp: 300, atk: 30, abName: "山月記", hint: "『山月記』の著者。自尊心と羞恥心によって虎に変貌してしまう男を描いた。" }
        ];

        let player = null, enemy = null, isOnlineMode = false, currentRoomId = "", playerRole = "", isGameover = false;
        let selectedBungoIndex = 0, currentQuiz = null, onlineSyncTimer = null;

        function goToSelectScreen(online) {
            isOnlineMode = online;
            document.getElementById('rules-screen').style.display = "none";
            document.getElementById('character-select').style.display = "block";
            document.getElementById('online-setup').style.display = online ? "flex" : "none";
            createSelectScreen();
        }

        function createSelectScreen() {
            const grid = document.getElementById('select-grid-container');
            grid.innerHTML = "";
            bungoData.forEach((bungo, index) => {
                const btn = document.createElement('button');
                btn.className = "select-card-btn";
                if(isOnlineMode && selectedBungoIndex === index) btn.style.borderColor = "#00ffcc";
                btn.innerHTML = `<div class="select-name">${bungo.name}</div><div class="select-stats">HP: ${bungo.hp} / ATK: ${bungo.atk}</div>`;
                btn.onclick = () => {
                    selectedBungoIndex = index;
                    if(!isOnlineMode) startOfflineGame(index);
                    else createSelectScreen();
                };
                grid.appendChild(btn);
            });
        }

        function startOfflineGame(index) {
            player = { ...bungoData[index] };
            enemy = { ...bungoData[(index + 1) % bungoData.length], name: "CPU" };
            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            updateDisplay(); nextTurn();
        }

        // 🌐 オンラインゲーム開始
        async function startOnlineGame(role) {
            const roomNum = document.getElementById('room-input').value;
            if(!roomNum) { alert("部屋番号を入力してね"); return; }
            currentRoomId = "room_" + roomNum;
            playerRole = role;
            player = { ...bungoData[selectedBungoIndex] };
            isGameover = false;

            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            document.getElementById('log-text').innerText = "接続中...";

            // ⚠️ 互換性トリック: さっき作った 5つのカラム(h_name, h_ab, g_name, g_ab, last_action) だけで全てを通信！
            // h_ab と g_ab に「現在のHP_攻撃力」を文字として合体させて滑り込ませます！
            if(role === 'host') {
                await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "DELETE" });
                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        id: currentRoomId,
                        h_name: player.name,
                        h_ab: `${player.hp}_${player.atk}_${player.abName}`, // HP、攻撃力、技名を合体
                        g_name: "待機中...",
                        g_ab: "0_0_-",
                        last_action: "正常稼働"
                    })
                });
                enemy = { name: "待機中...", hp: 100, atk: 0, abName: "-" };
            } else {
                const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
                const rooms = await res.json();
                if(!rooms || rooms.length === 0) { alert("部屋がありません"); location.reload(); return; }
                
                const room = rooms[0];
                const hData = room.h_ab.split('_');
                enemy = { name: room.h_name, hp: parseInt(hData[0]), atk: parseInt(hData[1]), abName: hData[2] };

                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        id: currentRoomId,
                        h_name: room.h_name, h_ab: room.h_ab,
                        g_name: player.name,
                        g_ab: `${player.hp}_${player.atk}_${player.abName}`,
                        last_action: "ゲスト参入"
                    }),
                    headers: { "Prefer": "resolution=merge-duplicates" }
                });
            }

            updateDisplay();
            nextTurn();
            onlineSyncTimer = setInterval(syncOnlineData, 1200); // リアルタイム同期
        }

        // 🔄 オンラインデータの超リアルタイム同期
        async function syncOnlineData() {
            if(isGameover || !isOnlineMode) return;

            // 自分の最新HPをSupabaseに即座に送信
            const myStatusStr = `${player.hp}_${player.atk}_${player.abName}`;
            const payload = playerRole === 'host' ? { h_ab: myStatusStr } : { g_ab: myStatusStr };
            
            // 相手がHPを減らしてきた（last_actionにダメージが刻まれた）かを確認するため、まずGET
            const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
            const rooms = await res.json();
            
            if(rooms && rooms.length > 0) {
                const room = rooms[0];
                
                // 相手からの攻撃が届いているかチェックして自分のHPを同期
                if(playerRole === 'host') {
                    const gData = room.g_ab.split('_');
                    if(room.g_name !== "待機中...") {
                        enemy.name = room.g_name;
                        enemy.hp = parseInt(gData[0]);
                        enemy.atk = parseInt(gData[1]);
                        enemy.abName = gData[2];
                    }
                    // 相手から自分への攻撃を検知したらHPを反映
                    const hData = room.h_ab.split('_');
                    player.hp = parseInt(hData[0]);
                } else {
                    const hData = room.h_ab.split('_');
                    enemy.name = room.h_name;
                    enemy.hp = parseInt(hData[0]);
                    enemy.atk = parseInt(hData[1]);
                    enemy.abName = hData[2];
                    
                    // 相手から自分への攻撃を検知したらHPを反映
                    const gData = room.g_ab.split('_');
                    player.hp = parseInt(gData[0]);
                }
            }

            // 自分のHPを送信
            await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });

            updateDisplay();
            checkBattleOver();
        }

        function updateDisplay() {
            if(!player || !enemy) return;
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-hp-display').innerText = `HP: ${Math.max(0, player.hp)}`;
            document.getElementById('p-atk-display').innerText = `ATK: ${player.atk}`;
            document.getElementById('p-ability-name').innerText = `⚡ ${player.abName}`;

            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-hp-display').innerText = `HP: ${Math.max(0, enemy.hp)}`;
            document.getElementById('e-atk-display').innerText = enemy.atk ? `ATK: ${enemy.atk}` : "ATK: --";
            document.getElementById('e-ability-name').innerText = `⚡ ${enemy.abName}`;
        }

        function nextTurn() {
            if(isGameover) return;
            currentQuiz = bungoData[Math.floor(Math.random() * bungoData.length)];
            document.getElementById('hint-text').innerText = currentQuiz.hint;

            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            // クイズの選択肢をシャッフル生成
            let choices = [currentQuiz.name];
            while(choices.length < 4) {
                let rName = bungoData[Math.floor(Math.random() * bungoData.length)].name;
                if(!choices.includes(rName)) choices.push(rName);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => handleAnswer(name);
                container.appendChild(btn);
            });
        }

        // ⚔️ クイズに答えた時のダメージ処理
        async function handleAnswer(selectedName) {
            if(isGameover) return;
            if(isOnlineMode && enemy.hp <= 0) return;

            const log = document.getElementById('log-text');

            if(selectedName === currentQuiz.name) {
                // ⭕正解！相手のHPを減らす！
                enemy.hp = Math.max(0, enemy.hp - player.atk);
                log.innerText = `⭕正解！相手の ${enemy.name} に ${player.atk} ダメージ！`;
                log.style.color = "#00ffcc";

                // オンラインの場合は「相手のHPを減らした状態」を即座にSupabaseに送りつける！
                if(isOnlineMode) {
                    const enemyStatusStr = `${enemy.hp}_${enemy.atk}_${enemy.abName}`;
                    const payload = playerRole === 'host' ? { g_ab: enemyStatusStr, last_action: "H攻撃" } : { h_ab: enemyStatusStr, last_action: "G攻撃" };
                    await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
                }
            } else {
                // ❌不正解！ペナルティで自分がダメージを受ける！
                let penaltyDmg = isOnlineMode ? (enemy.atk || 25) : enemy.atk;
                player.hp = Math.max(0, player.hp - penaltyDmg);
                log.innerText = `❌不正解… 正解は【${currentQuiz.name}】。誤答反撃で ${penaltyDmg} ダメージを受けた！`;
                log.style.color = "#ff4d4d";

                if(isOnlineMode) {
                    const myStatusStr = `${player.hp}_${player.atk}_${player.abName}`;
                    const payload = playerRole === 'host' ? { h_ab: myStatusStr } : { g_ab: myStatusStr };
                    await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
                }
            }

            updateDisplay();
            if(!checkBattleOver()) {
                setTimeout(nextTurn, 1200);
            }
        }

        function checkBattleOver() {
            if(isGameover) return true;
            const log = document.getElementById('log-text');

            if(enemy.hp <= 0 && enemy.name !== "待機中...") {
                isGameover = true; clearInterval(onlineSyncTimer);
                log.innerText = `🎉 勝負あり！対戦相手を撃破しました！あなたの勝利です！`;
                log.style.color = "#dab358"; showResetButton(); return true;
            } else if(player.hp <= 0) {
                isGameover = true; clearInterval(onlineSyncTimer);
                log.innerText = `💀 勝負あり！あなたの文豪が倒れました… 敗北です。`;
                log.style.color = "#ff4d4d"; showResetButton(); return true;
            }
            return false;
        }

        function showResetButton() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const rBtn = document.createElement('button');
            rBtn.className = "btn"; rBtn.style.gridColumn = "span 2"; rBtn.style.backgroundColor = "#dab358"; rBtn.style.color = "black";
            rBtn.innerText = "タイトルに戻る";
            rBtn.onclick = () => location.reload();
            container.appendChild(rBtn);
        }
    </script>
</body>
</html>
