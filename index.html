            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },

            { hint: "『五重塔』の著者。尾崎紅葉と並び「紅露時代」と称された幸田露伴。", ans: "幸田露伴" },
            { hint: "『高野聖』の作者で、明治から大正にかけて浪漫主義的な幻想小説を多く残した文豪。", ans: "泉鏡花" },
            { hint: "『みだれ髪』で知られ、日露戦争に赴く弟を想う詩「君死にたまふことなかれ」を発表した女性詩人。", ans: "与謝野晶子" },
            { hint: "『一握の砂』『悲しき玩具』を残し、26歳の若さで没した石川啄木の代表的な文芸ジャンルは短歌。", ans: "石川啄木" },
            { hint: "『智恵子抄』『道程』の著者。彫刻家としても著名な詩人。", ans: "高村光太郎" },
            { hint: "『汚れつちまつた悲しみに……』などの詩で知られる大正・昭和期の日本の詩人。", ans: "中原中也" },
            { hint: "『それから』『門』『三四郎』などの前期三部作を手掛けた明治の代表的文豪。", ans: "夏目漱石" },
            { hint: "『彼岸過迄』『行人』『こころ』などの後期三部作を手掛けた文豪。", ans: "夏目漱石" },
            { hint: "『晩年』『斜陽』『ヴィヨンの妻』など、没落していく登場人物を描くのが得意だった無頼派作家。", ans: "太宰治" },
            { hint: "『地獄変』『河童』『歯車』の著者。大正文学の芥川賞に名を残す文豪。", ans: "芥川龍之介" },
            { hint: "『春琴抄』『陰翳礼讃』の著者。日本の伝統的な美や、悪魔主義的、官能的な世界を描いた。", ans: "谷崎潤一郎" },
            { hint: "『雁』『阿部一族』の著者。翻訳家や評論家としても一流だった明治の巨頭。", ans: "森鴎外" },
            { hint: "『風の又三郎』『グスコーブドリの伝記』の著者。独自の宗教観と科学の目を持っていた。", ans: "宮沢賢治" },
            { hint: "『潮騒』『仮面の告白』の著者。ノーベル賞候補に何度も上った美学の作家。", ans: "三島由紀夫" },
            { hint: "『若菜集』でロマン主義詩人として出発し、後に『破戒』で自然主義に転じた文豪。", ans: "島崎藤村" },
            { hint: "『和解』『小僧の神様』の著者。志賀直哉が所属していた文芸雑誌派閥は白樺派。", ans: "志賀直哉" },
            { hint: "『放浪記』『浮雲』の著者。独自のたくましい女性像を描き続けた昭和の女性作家。", ans: "林芙美子" },
            { hint: "『縮図』『徳田秋声伝』の著者。自然主義文学のなかで最も客観的な描写を得意とした。", ans: "徳田秋声" },
            { hint: "『蒲団』の著者。自らの私生活を告白する形式（私小説）の源流となった自然主義作家。", ans: "田山花袋" },
            { hint: "『青い山脈』『石中先生行状記』の著者。戦後の明るい民主主義文学をリードした。", ans: "石坂洋次郎" },
            { hint: "『恩讐の彼方に』『父帰る』の著者。文藝春秋を創設し芥川賞・直木賞を設立した。", ans: "菊池寛" },
            { hint: "『友情』『その妹』の著者。白樺派の中心人物で人道主義的な思想を持っていた。", ans: "武者小路実篤" },
            { hint: "『風立ちぬ』『菜穂子』の著者。堀辰雄が師事した、精神的な深みを持つ文豪。", ans: "堀辰雄" },
            { hint: "『氷壁』『敦煌』『天平の甍』の著者。歴史小説や近代の山岳小説で知られる。", ans: "井上靖" },
            { hint: "『太陽の季節』の著者。戦後日本の若者の既成モラルへの反抗を描き「太陽族」と呼ばれた。", ans: "石原慎太郎" },
            { hint: "『山の音』『千羽鶴』の著者。新感覚派の代表であり、幽玄の美の世界を描いた。", ans: "川端康成" },
            { hint: "『斜陽』がベストセラーとなり、没落していく上流階級の人々を指す言葉の語源となった文豪。", ans: "太宰治" },
            { hint: "『小説の神様』と慕われ、極限まで無駄を削ぎ落とした簡潔で力強い文体を持つ作家。", ans: "志賀直哉" },
            { hint: "『藪の中』の著者。一つの事件を巡り複数の目撃者が矛盾した証言をする、現代でも多用されるプロットの生みの親。", ans: "芥川龍之介" },
            { hint: "『坊っちゃん』の舞台であり、夏目漱石自身が英語教師として赴任していた愛媛県の都市。", ans: "松山市" },
            { hint: "『五重塔』を著し、当時の幸田露伴の文学的ポジションを尾崎紅葉と並べて「○露時代」という。", ans: "紅" },
            { hint: "『細雪』の舞台。谷崎潤一郎が関東大震災を機に移住し、多大な影響を受けた日本の地域。", ans: "関西" }
        ];

        let player = null, enemy = null, isOnlineMode = false, currentRoomId = "", playerRole = "", isGameover = false;
        let selectedBungoIndex = 0, currentQuiz = null, onlineSyncTimer = null;
        
        let comboCount = 0, hasPoppoyaTriggered = false, hasShinubugawaTriggered = false, firstCorrect敦 = true;
        let pShield = 0, eShield = 0;

        function goToSelectScreen(online) {
            isOnlineMode = online;
            document.getElementById('rules-screen').style.display = "none";
            document.getElementById('character-select').style.display = "block";
            document.getElementById('online-setup').style.display = online ? "flex" : "none";
            createSelectScreen();
        }

        function createSelectScreen() {
            const grid = document.getElementById('select-grid-container');
            grid.innerHTML = "";
            bungoData.forEach((bungo, index) => {
                const btn = document.createElement('button');
                btn.className = "select-card-btn";
                if(isOnlineMode && selectedBungoIndex === index) btn.style.borderColor = "#00ffcc";
                btn.innerHTML = `
                    <div class="select-name">${bungo.name}</div>
                    <div class="select-stats">HP: ${bungo.hp} / ATK: ${bungo.atk}</div>
                    <div class="select-ability">⚡${bungo.abName}: ${bungo.desc}</div>
                `;
                btn.onclick = () => {
                    selectedBungoIndex = index;
                    if(!isOnlineMode) startOfflineGame(index);
                    else createSelectScreen();
                };
                grid.appendChild(btn);
            });
        }

        function startOfflineGame(index) {
            player = { ...bungoData[index] };
            let enemyIndex = (index + 1) % bungoData.length;
            enemy = { ...bungoData[enemyIndex], name: "CPU" };
            initAbilities();
            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            updateDisplay(); nextTurn();
        }

        function initAbilities() {
            comboCount = 0; hasPoppoyaTriggered = false; hasShinubugawaTriggered = false; firstCorrect敦 = true;
            pShield = 0; eShield = 0;
            if (player && player.abName === "親心のバリア") pShield = 40;
            if (enemy && enemy.abName === "親心のバリア") eShield = 40;
        }

        // ⚡ Supabaseの規定カラム（id, h_name, h_ab, g_name, g_ab）のみを厳密に送信するロジック
        async function startOnlineGame(role) {
            const roomNum = document.getElementById('room-input').value;
            if(!roomNum) { alert("部屋番号を入力してください"); return; }
            currentRoomId = "room_" + roomNum;
            playerRole = role;
            player = { ...bungoData[selectedBungoIndex] };
            isGameover = false;
            
            enemy = { name: "待機中...", hp: 100, maxHp: 100, atk: 0, baseAtk: 0, abName: "-", desc: "" };
            initAbilities();

            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";
            document.getElementById('log-text').innerText = "対戦相手の入室を待っています...";

            const myStatusStr = `${player.hp}_${player.atk}_${player.abName}_${pShield}`;

            if(role === 'host') {
                // 既存の古い同番号部屋を完全に消去
                await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "DELETE" });
                // テーブル構造に完全準拠した最小限のインサート
                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        id: currentRoomId,
                        h_name: player.name,
                        h_ab: myStatusStr,
                        g_name: "待機中...",
                        g_ab: "0_0_-_0"
                    })
                });
            } else {
                const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
                const rooms = await res.json();
                if(!rooms || rooms.length === 0) { alert("部屋が見つかりません。ホストが作成するまでお待ちください。"); location.reload(); return; }
                
                const room = rooms[0];
                const hData = room.h_ab.split('_');
                enemy = { name: room.h_name, hp: parseInt(hData[0]), maxHp: parseInt(hData[0]), atk: parseInt(hData[1]), baseAtk: parseInt(hData[1]), abName: hData[2] };
                if (enemy.abName === "親心のバリア") eShield = 40;

                // ゲストデータをマージ
                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({
                        id: currentRoomId,
                        h_name: room.h_name, 
                        h_ab: room.h_ab,
                        g_name: player.name,
                        g_ab: myStatusStr
                    }),
                    headers: { "Prefer": "resolution=merge-duplicates" }
                });
            }

            updateDisplay();
            nextTurn();
            if(onlineSyncTimer) clearInterval(onlineSyncTimer);
            onlineSyncTimer = setInterval(syncOnlineData, 1200); 
        }

        async function syncOnlineData() {
            if(isGameover || !isOnlineMode) return;

            const myStatusStr = `${player.hp}_${player.atk}_${player.abName}_${pShield}`;
            const payload = playerRole === 'host' ? { h_ab: myStatusStr } : { g_ab: myStatusStr };
            
            const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
            const rooms = await res.json();
            
            if(rooms && rooms.length > 0) {
                const room = rooms[0];
                
                if(playerRole === 'host') {
                    const gData = room.g_ab.split('_');
                    if(room.g_name !== "待機中...") {
                        enemy.name = room.g_name;
                        enemy.hp = parseInt(gData[0]);
                        enemy.atk = parseInt(gData[1]);
                        enemy.abName = gData[2];
                        eShield = parseInt(gData[3]) || 0;
                    }
                    const hData = room.h_ab.split('_');
                    player.hp = parseInt(hData[0]);
                    pShield = parseInt(hData[3]) || 0;
                } else {
                    const hData = room.h_ab.split('_');
                    enemy.name = room.h_name;
                    enemy.hp = parseInt(hData[0]);
                    enemy.atk = parseInt(hData[1]);
                    enemy.abName = hData[2];
                    eShield = parseInt(hData[3]) || 0;
                    
                    const gData = room.g_ab.split('_');
                    player.hp = parseInt(gData[0]);
                    pShield = parseInt(gData[3]) || 0;
                }
            }

            // 安全に同期更新
            await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
            updateDisplay();
            checkBattleOver();
        }

        function updateDisplay() {
            if(!player || !enemy) return;
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-hp-display').innerText = `HP: ${Math.max(0, player.hp)} / ${player.maxHp}`;
            document.getElementById('p-atk-display').innerText = `ATK: ${player.atk}`;
            document.getElementById('p-ability-name').innerText = `⚡ ${player.abName}`;
            
            if(pShield > 0) {
                document.getElementById('p-shield-display').style.display = "block";
                document.getElementById('p-shield-display').innerText = `🛡️ 障壁: ${pShield}`;
            } else { document.getElementById('p-shield-display').style.display = "none"; }

            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-hp-display').innerText = `HP: ${Math.max(0, enemy.hp)}`;
            document.getElementById('e-atk-display').innerText = enemy.atk ? `ATK: ${enemy.atk}` : "ATK: --";
            document.getElementById('e-ability-name').innerText = `⚡ ${enemy.abName}`;

            if(eShield > 0) {
                document.getElementById('e-shield-display').style.display = "block";
                document.getElementById('e-shield-display').innerText = `🛡️ 障壁: ${eShield}`;
            } else { document.getElementById('e-shield-display').style.display = "none"; }
        }

        function nextTurn() {
            if(isGameover) return;
            
            if(player.abName === "おせっかいな宇宙人") {
                player.atk = Math.floor(Math.random() * 31) + 15; 
                updateDisplay();
            }

            currentQuiz = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById('hint-text').innerText = currentQuiz.hint;

            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            let choices = [currentQuiz.ans];
            while(choices.length < 4) {
                let rName = allBungoNamesForDummy[Math.floor(Math.random() * allBungoNamesForDummy.length)];
                if(!choices.includes(rName)) choices.push(rName);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => handleAnswer(name);
                container.appendChild(btn);
            });
        }

        async function handleAnswer(selectedName) {
            if(isGameover) return;
            if(isOnlineMode && enemy.hp <= 0) return;

            const log = document.getElementById('log-text');
            let logMsg = "";

            if(player.abName === "金閣炎上") {
                player.hp = Math.max(1, player.hp - 7);
                logMsg += "【金閣炎上】で自身に7の自傷ダメージ。";
            }

            if(selectedName === currentQuiz.ans) {
                comboCount++;
                let dmg = player.atk;

                if(player.abName === "太宰治" && player.hp <= (player.maxHp / 2)) {
                    dmg = Math.floor(dmg * 1.3);
                    logMsg += "【人間失格】発動(ATK1.3倍)！ ";
                }
                if(player.abName === "中島敦" && firstCorrect敦) {
                    dmg = dmg * 2; firstCorrect敦 = false;
                    logMsg += "【月下獣】初正解2倍の超咆哮！ ";
                }
                if(player.abName === "梶井基次郎") {
                    let hpRatio = (player.maxHp - player.hp) / player.maxHp;
                    let mult = 1.0 + (hpRatio * 0.5);
                    dmg = Math.floor(dmg * mult);
                    logMsg += "【鮮烈なる檸檬】減少HP比例の追撃！ ";
                }
                if(player.abName === "野間宏" && player.hp <= (player.maxHp * 0.3)) {
                    dmg = Math.floor(dmg * 1.4);
                    logMsg += "【真空地帯】逆境の1.4倍！ ";
                }
                if(player.abName === "開高健" && Math.random() < 0.15) {
                    dmg = dmg * 2;
                    logMsg += "【熱き輝ける闇】2倍ダメージ！ ";
                }

                let isEvaded = false;
                if(enemy.abName === "森鴎外" && Math.random() < 0.20) isEvaded = true;
                if(enemy.abName === "幸田文" && Math.random() < 0.15) isEvaded = true;

                if(isEvaded) {
                    logMsg += `⭕正解！しかし敵の特殊能力で見切られ回避された！`;
                } else {
                    if(enemy.abName === "雨ニモマケズ") dmg = Math.max(1, dmg - 5);
                    if(enemy.abName === "戦後の幻影") dmg = Math.max(1, dmg - 2);
                    if(enemy.abName === "大いなる沈黙") dmg = Math.max(1, Math.floor(dmg * 0.85));

                    if(eShield > 0) {
                        if(eShield >= dmg) { eShield -= dmg; dmg = 0; }
                        else { dmg -= eShield; eShield = 0; }
                        logMsg += `🛡️ 敵の障壁がダメージを吸収！`;
                    }

                    enemy.hp = Math.max(0, enemy.hp - dmg);
                    logMsg += `⭕正解！相手の ${enemy.name} に ${dmg} ダメージ！`;
                }

                if(player.abName === "夏目漱石" && Math.random() < 0.25) {
                    player.hp = Math.min(player.maxHp, player.hp + 30);
                    logMsg += "【月が綺麗ですね】確率HP30回復！";
                }
                if(player.abName === "井上靖" && comboCount % 3 === 0) {
                    player.hp = Math.min(player.maxHp, player.hp + 40);
                    logMsg += "【天平の甍】3連撃でHP40大回復！";
                }
                if(player.abName === "大江健三郎") {
                    player.atk += 3;
                    logMsg += "【個人的な神話】ATKが永続で+3成長！";
                }

                if(enemy.abName === "蜘蛛の糸" && !isEvaded) {
                    player.hp = Math.max(1, player.hp - 10);
                    enemy.hp = Math.min(enemy.maxHp, enemy.hp + 10);
                    logMsg += " ➔ 敵の【蜘蛛の糸】で10ドレイン反撃！";
                }

                log.innerText = logMsg; log.style.color = "#00ffcc";

                if(isOnlineMode) {
                    const enemyStatusStr = `${enemy.hp}_${enemy.atk}_${enemy.abName}_${eShield}`;
                    const payload = playerRole === 'host' ? { g_ab: enemyStatusStr } : { h_ab: enemyStatusStr };
                    await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
                }

            } else {
                comboCount = 0;
                let penalty = isOnlineMode ? (enemy.atk || 30) : 30;

                if(player.abName === "砂の壁") {
                    penalty = 0;
                    logMsg += "【砂の壁】により誤答ペナルティを完全カット！ ";
                }

                if(penalty > 0) {
                    if(player.abName === "遠藤周作") penalty = Math.max(1, Math.floor(penalty * 0.85));
                    
                    if(pShield > 0) {
                        if(pShield >= penalty) { pShield -= penalty; penalty = 0; }
                        else { penalty -= pShield; pShield = 0; }
                    }
                    player.hp = Math.max(0, player.hp - penalty);
                }

                logMsg += `❌不正解… 正解は【${currentQuiz.ans}】。誤答反撃で ${penalty} ダメージを受けた！`;
                log.innerText = logMsg; log.style.color = "#ff4d4d";

                if(isOnlineMode) {
                    const myStatusStr = `${player.hp}_${player.atk}_${player.abName}_${pShield}`;
                    const payload = playerRole === 'host' ? { h_ab: myStatusStr } : { g_ab: myStatusStr };
                    await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });
                }
            }

            if(player.abName === "断腸亭日乗" && enemy.hp > 0) {
                enemy.hp = Math.max(0, enemy.hp - 5); player.hp = Math.min(player.maxHp, player.hp + 5);
            }
            if(player.abName === "駆ける衝動" && enemy.hp > 0) {
                enemy.hp = Math.max(0, enemy.hp - 10);
            }

            if(player.hp <= 50 && player.hp > 0 && player.abName === "忍ぶ川の情愛" && !hasShinubugawaTriggered) {
                player.hp += 40; hasShinubugawaTriggered = true;
                log.innerText += "【忍ぶ川の情愛】HP40回復！";
            }
            if(player.hp <= 0 && player.abName === "浅田次郎" && !hasPoppoyaTriggered) {
                player.hp = 1; hasPoppoyaTriggered = true;
                log.innerText += "【ぽっぽやの奇跡】一度だけHP1で耐えた！";
            }

            updateDisplay();
            if(!checkBattleOver()) {
                setTimeout(nextTurn, 1600);
            }
        }

        function checkBattleOver() {
            if(isGameover) return true;
            const log = document.getElementById('log-text');

            if(enemy.hp <= 0 && enemy.name !== "待機中...") {
                isGameover = true; if(onlineSyncTimer) clearInterval(onlineSyncTimer);
                log.innerText = `🎉 勝負あり！対戦相手の ${enemy.name} を撃破！あなたの勝利です！`;
                log.style.color = "#dab358"; showResetButton(); return true;
            } else if(player.hp <= 0) {
                isGameover = true; if(onlineSyncTimer) clearInterval(onlineSyncTimer);
                log.innerText = `💀 勝負あり！あなたの ${player.name} は力尽きた… 敗北です。`;
                log.style.color = "#ff4d4d"; showResetButton(); return true;
            }
            return false;
        }

        function showResetButton() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const rBtn = document.createElement('button');
            rBtn.className = "btn"; rBtn.style.gridColumn = "span 2"; rBtn.style.backgroundColor = "#dab358"; rBtn.style.color = "black";
            rBtn.innerText = "タイトルに戻る";
            rBtn.onclick = () => location.reload();
            container.appendChild(rBtn);
        }
    </script>
</body>
</html>
