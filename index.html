<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトルカードゲーム（修正版）</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; text-align: center; padding: 20px; }
        h1 { color: #dab358; }
        .auth-container { background-color: #2a2a2a; border: 2px solid #dab358; padding: 20px; border-radius: 10px; max-width: 350px; margin: 0 auto 20px; }
        .auth-input { background-color: #333; border: 1px solid #555; color: white; padding: 10px; width: 90%; margin-bottom: 10px; }
        .auth-btn { background: #dab358; color: black; border: none; padding: 10px; width: 95%; font-weight: bold; cursor: pointer; }
        .switch-auth-lnk { color: #00ffcc; cursor: pointer; font-size: 0.85em; text-decoration: underline; }
        .game-main-content { display: none; }
        .btn { background: #3a3a3a; color: white; border: 1px solid #555; padding: 10px 20px; margin: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #dab358; color: black; }
        .battle-field { display: flex; justify-content: space-around; max-width: 600px; margin: 20px auto; }
        .card { background: #2c2c2c; border: 2px solid #dab358; border-radius: 8px; width: 140px; padding: 10px; }
        .quiz-container { background-color: #2a2a2a; padding: 20px; border-radius: 8px; max-width: 500px; margin: 20px auto; }
        .hint-box { background-color: #222; padding: 15px; text-align: left; margin-bottom: 15px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .log { margin-top: 15px; font-weight: bold; color: #00ffcc; min-height: 50px; background:#111; padding:10px; }
    </style>
</head>
<body>

    <h1>国語便覧 文豪バトル</h1>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">🔐 ログイン</h2>
        <p id="auth-msg" style="color:#ff4d4d; font-size:0.85em;"></p>
        <input type="email" id="auth-email" class="auth-input" placeholder="メールアドレス">
        <input type="password" id="auth-password" class="auth-input" placeholder="パスワード (6文字以上)">
        <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">ログインする</button>
        <p><span id="auth-switch-text" class="switch-auth-lnk" onclick="toggleAuthMode()">新しくアカウントを作る（新規登録）</span></p>
    </div>

    <div id="game-main-content" class="game-main-content">
        <p id="login-user-badge" style="color:#00ffcc;"></p>

        <div id="mode-screen">
            <button class="btn" onclick="startOffline()">👤 一人で遊ぶ</button>
            <hr style="border-color:#444; margin:20px;">
            <h3>🌐 オンライン対戦部屋設定</h3>
            <input type="number" id="room-input" style="padding:10px; text-align:center;" placeholder="4桁の部屋番号">
            <br><br>
            <button class="btn" onclick="startOnline('host')">部屋を作る (先に入る)</button>
            <button class="btn" style="background:#00ffcc; color:black;" onclick="startOnline('guest')">部屋に入る (後から入る)</button>
        </div>

        <div id="battle-screen" style="display:none;">
            <div class="battle-field">
                <div class="card">
                    <div style="font-size:0.8em; color:#aaa;">あなた</div>
                    <h3 id="p-name">-</h3>
                    <div id="p-hp" style="color:#ff4d4d; font-weight:bold;">HP: 100</div>
                </div>
                <div style="font-size: 2em; align-self: center; color: #dab358;">VS</div>
                <div class="card">
                    <div style="font-size:0.8em; color:#aaa;">相手</div>
                    <h3 id="e-name">待機中...</h3>
                    <div id="e-hp" style="color:#ff4d4d; font-weight:bold;">HP: 100</div>
                </div>
            </div>
            <div class="quiz-container">
                <div class="hint-box" id="hint-text"></div>
                <div class="options" id="options-container"></div>
                <div class="log" id="log-text">バトル開始！</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eqqbxsiptbgxgsznuzhq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_yP1Xswfbs9_K0-1CoSimPw_p1TXzzxd";
        let currentAuthMode = "login"; 
        let loginUserToken = "";

        // 認証処理
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');
            msg.innerText = "通信中...";

            let url = `${SUPABASE_URL}/auth/v1/token?grant_type=password`; 
            if(currentAuthMode === "signup") url = `${SUPABASE_URL}/auth/v1/signup`; 

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(!res.ok) { msg.innerText = `エラー: ${data.msg || "失敗しました"}`; return; }

                if(currentAuthMode === "signup") {
                    msg.innerText = "アカウント作成成功！ログインしてください。";
                    toggleAuthMode();
                } else {
                    loginUserToken = data.access_token;
                    document.getElementById('auth-screen').style.display = "none";
                    document.getElementById('game-main-content').style.display = "block";
                    document.getElementById('login-user-badge').innerText = `👤 ログイン中: ${data.user.email}`;
                }
            } catch(e) { msg.innerText = "通信エラー"; }
        }

        function toggleAuthMode() {
            currentAuthMode = (currentAuthMode === "login") ? "signup" : "login";
            document.getElementById('auth-title').innerText = currentAuthMode === "login" ? "🔐 ログイン" : "📝 新規登録";
            document.getElementById('auth-submit-btn').innerText = currentAuthMode === "login" ? "ログインする" : "登録する";
        }

        // DB通信共通
        async function supabaseFetch(endpoint, options = {}) {
            const headers = {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            };
            return fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { ...options, headers: { ...headers, ...options.headers } });
        }

        const quizData = [
            { hint: "『人間失格』『走れメロス』の著者。", ans: "太宰治", choices: ["太宰治", "夏目漱石", "芥川龍之介", "中島敦"] },
            { hint: "『吾輩は猫である』『こころ』の著者。", ans: "夏目漱石", choices: ["夏目漱石", "太宰治", "森鴎外", "宮沢賢治"] },
            { hint: "『羅生門』『蜘蛛の糸』の著者。", ans: "芥川龍之介", choices: ["芥川龍之介", "太宰治", "中島敦", "江戸川乱歩"] }
        ];

        let playerHp = 200, enemyHp = 200, currentRoomId = "", playerRole = "", isGameover = false;
        let syncTimer = null;

        function startOffline() {
            document.getElementById('mode-screen').style.display = "none";
            document.getElementById('battle-screen').style.display = "block";
            document.getElementById('p-name').innerText = "あなた";
            document.getElementById('e-name').innerText = "CPU";
            nextQuiz();
        }

        async function startOnline(role) {
            const roomNum = document.getElementById('room-input').value;
            if(!roomNum) { alert("部屋番号を入れてね"); return; }
            currentRoomId = "room_" + roomNum;
            playerRole = role;

            document.getElementById('mode-screen').style.display = "none";
            document.getElementById('battle-screen').style.display = "block";

            if(role === 'host') {
                document.getElementById('p-name').innerText = "ホスト(あなた)";
                document.getElementById('log-text').innerText = "ゲストの入室を待っています...";
                
                // 既存の部屋を消して新規作成 (今作った5つのカラムだけで送信)
                await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "DELETE" });
                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({ id: currentRoomId, h_name: "ホストプレイヤー", h_ab: "200", g_name: "待機中...", g_ab: "200", last_action: "ホスト入室" })
                });
            } else {
                document.getElementById('p-name').innerText = "ゲスト(あなた)";
                document.getElementById('log-text').innerText = "部屋に接続中...";

                const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
                const rooms = await res.json();
                if(!rooms || rooms.length === 0) { alert("部屋が見つかりません！"); location.reload(); return; }

                // ゲスト情報を上書き
                await supabaseFetch("rooms", {
                    method: "POST",
                    body: JSON.stringify({ id: currentRoomId, h_name: rooms[0].h_name, h_ab: rooms[0].h_ab, g_name: "ゲストプレイヤー", g_ab: "200", last_action: "ゲスト入室" }),
                    headers: { "Prefer": "resolution=merge-duplicates" }
                });
            }

            nextQuiz();
            syncTimer = setInterval(syncOnline, 1500);
        }

        async function syncOnline() {
            if(isGameover) return;
            
            // 自分のHPを「h_ab」または「g_ab」を身代わりにして保存！
            const payload = playerRole === 'host' ? { h_ab: String(playerHp) } : { g_ab: String(playerHp) };
            await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "PATCH", body: JSON.stringify(payload) });

            // 相手のHPを取得
            const res = await supabaseFetch(`rooms?id=eq.${currentRoomId}`, { method: "GET" });
            const rooms = await res.json();
            if(rooms && rooms.length > 0) {
                const room = rooms[0];
                if(playerRole === 'host') {
                    if(room.g_name !== "待機中...") {
                        document.getElementById('e-name').innerText = room.g_name;
                        enemyHp = parseInt(room.g_ab) || 0;
                    }
                } else {
                    document.getElementById('e-name').innerText = room.h_name;
                    enemyHp = parseInt(room.h_ab) || 0;
                }
            }
            
            document.getElementById('p-hp').innerText = `HP: ${playerHp}`;
            document.getElementById('e-hp').innerText = `HP: ${enemyHp}`;
            checkWinLose();
        }

        function nextQuiz() {
            if(isGameover) return;
            const q = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById('hint-text').innerText = q.hint;
            
            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = "";
            q.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = c;
                b.onclick = () => {
                    if(c === q.ans) {
                        enemyHp -= 30;
                        document.getElementById('log-text').innerText = `⭕正解！相手に30ダメージ！`;
                    } else {
                        playerHp -= 20;
                        document.getElementById('log-text').innerText = `❌不正解…自分に20ダメージ！`;
                    }
                    document.getElementById('p-hp').innerText = `HP: ${playerHp}`;
                    document.getElementById('e-hp').innerText = `HP: ${enemyHp}`;
                    
                    if(!checkWinLose()) setTimeout(nextQuiz, 1000);
                };
                optContainer.appendChild(b);
            });
        }

        function checkWinLose() {
            if(isGameover) return true;
            if(enemyHp <= 0) {
                isGameover = true; clearInterval(syncTimer);
                document.getElementById('log-text').innerText = "🎉 あなたの勝ちです！"; return true;
            } else if(playerHp <= 0) {
                isGameover = true; clearInterval(syncTimer);
                document.getElementById('log-text').innerText = "💀 あなたの負けです…"; return true;
            }
            return false;
        }
    </script>
</body>
</html>
