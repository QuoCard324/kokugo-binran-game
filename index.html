<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトルカードゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #dab358;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        /* キャラクター選択画面のスタイル */
        .select-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 10px;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .select-card-btn {
            background: linear-gradient(135deg, #3a3a3a, #222);
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .select-card-btn:hover {
            border-color: #dab358;
            transform: translateY(-2px);
        }
        .select-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #dab358;
            margin-bottom: 5px;
        }
        .select-stats {
            font-size: 0.85em;
            color: #ccc;
            margin-bottom: 5px;
        }
        .select-ability {
            font-size: 0.75em;
            color: #00ffcc;
            background-color: #111;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        /* バトルフィールドのレイアウト */
        .battle-container {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .battle-field {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        .card {
            background: linear-gradient(135deg, #2c2c2c, #111);
            border: 3px solid #dab358;
            border-radius: 10px;
            width: 140px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            position: relative;
        }
        .card.enemy {
            border-color: #c93a3a;
        }
        .card-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat {
            font-size: 1em;
            margin: 5px 0;
            font-weight: bold;
        }
        .hp { color: #ff4d4d; }
        .atk { color: #ffb300; }
        .ability-badge {
            font-size: 0.75em;
            color: #00ffcc;
            margin-top: 8px;
            border: 1px dashed #00ffcc;
            padding: 2px;
            border-radius: 4px;
        }

        /* クイズエリア */
        .quiz-container {
            background-color: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .hint-box {
            background-color: #222;
            border-left: 5px solid #dab358;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            font-size: 1.1em;
            line-height: 1.5;
            text-align: left;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #dab358;
            color: black;
            border-color: #dab358;
        }
        .log {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.05em;
            min-height: 50px;
            color: #00ffcc;
            line-height: 1.4;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>国語便覧 文豪バトル</h1>
    <p class="subtitle">正しい知識を選び、特殊能力で勝利を掴め！</p>

    <div id="character-select" class="select-container">
        <h2>あなたの出陣する文豪（デッキ）を選べ！</h2>
        <div class="select-grid" id="select-grid-container"></div>
    </div>

    <div id="battle-screen" class="battle-container">
        <div class="battle-field">
            <div class="card">
                <div style="font-size:0.8em; color:#aaa;">味方の文豪</div>
                <div class="card-name" id="p-name">???</div>
                <div class="stat hp">HP: <span id="p-hp">0</span></div>
                <div class="stat atk">ATK: <span id="p-atk">0</span></div>
                <div class="ability-badge" id="p-ability-name">能力未定</div>
            </div>

            <div style="font-size: 2em; align-self: center; color: #dab358;">VS</div>

            <div class="card enemy">
                <div style="font-size:0.8em; color:#aaa;">敵の文豪</div>
                <div class="card-name" id="e-name">???</div>
                <div class="stat hp">HP: <span id="e-hp">0</span></div>
                <div class="stat atk">ATK: <span id="e-atk">0</span></div>
                <div class="ability-badge" id="e-ability-name">能力未定</div>
            </div>
        </div>

        <div class="quiz-container">
            <div style="font-size: 0.9em; color: #aaa; margin-bottom: 5px; text-align: left;">【技の発動条件（お題）】</div>
            <div class="hint-box" id="hint-text"></div>
            
            <div class="options" id="options-container"></div>
            <div class="log" id="log-text"></div>
        </div>
    </div>

    <script>
        // 文豪データ（特殊能力データを追加！）
        const bungoData = [
            { name: "太宰治", hp: 120, maxHp: 120, atk: 35, hint: "「恥の多い生涯を送って来ました」で始まる『人間失格』の著者。心中未遂を繰り返した。", abName: "人間失格", abDesc: "HP半分以下でATK1.5倍" },
            { name: "夏目漱石", hp: 180, maxHp: 180, atk: 25, hint: "イギリス留学で神経衰弱になる。『吾輩は猫である』で一躍有名に。「月が綺麗ですね」の逸話も。", abName: "月が綺麗ですね", abDesc: "正解時25%の確率でHP30回復" },
            { name: "芥川龍之介", hp: 100, maxHp: 100, atk: 40, hint: "『羅生門』『鼻』の著者。ぼんやりとした不安を理由に35歳で早世。彼の名を冠した文学賞がある。", abName: "蜘蛛の糸", abDesc: "不正解時、敵HPを15ドレイン" },
            { name: "中島敦", hp: 150, maxHp: 150, atk: 30, hint: "『山月記』の著者。喘息のため33歳で早世。国語の教科書で虎になる男といえばこの人。", abName: "月下獣", abDesc: "最初の正解時のみ攻撃力2倍" },
            { name: "森鴎外", hp: 160, maxHp: 160, atk: 28, hint: "小説家でありながら、本職は「軍医（陸軍軍医総監）」。代表作は『舞姫』『高瀬舟』。", abName: "冷徹な軍医", abDesc: "20%の確率で敵攻撃を完全回避" },
            { name: "宮沢賢治", hp: 140, maxHp: 140, atk: 32, hint: "岩手県出身。農業指導をしながら『銀河鉄道の夜』や『注文の多い料理店』を執筆した。", abName: "雨ニモマケズ", abDesc: "受けるダメージを常に5軽減" },
            { name: "鴨長明", hp: 110, maxHp: 110, atk: 38, hint: "「ゆく河の流れは絶えずして、しかももとの水にあらず」で始まる鎌倉時代の随筆『方丈記』の著者。", abName: "無常観の押し付け", abDesc: "計3回正解で敵ATKを永久半減" },
            { name: "重松清", hp: 160, maxHp: 160, atk: 26, hint: "現代の作家。いじめや家族、思春期の葛藤をテーマにした『ナイフ』『エイジ』『とんび』などで知られる。", abName: "親心のバリア", abDesc: "開始時に耐久値40のシールド" },
            { name: "鷺沢萠", hp: 130, maxHp: 130, atk: 34, hint: "現役女子大生作家として注目され『川べりの道』や『駆ける少年』を発表。若者の孤独を瑞々しく描いた。", abName: "駆ける少年の衝動", abDesc: "毎ターン終了時敵に10ダメージ" }
        ];

        let player = {};
        let enemy = {};
        let currentQuizAnswer = "";
        let isGameover = false;

        // 特殊能力用の管理変数
        let playerCorrectCount = 0;
        let playerShield = 0;
        let isAtsushiTriggered = false;
        let isChomeiTriggered = false;

        function createSelectScreen() {
            const grid = document.getElementById('select-grid-container');
            grid.innerHTML = "";
            
            bungoData.forEach((bungo, index) => {
                const btn = document.createElement('button');
                btn.className = "select-card-btn";
                
                btn.innerHTML = `
                    <div class="select-name">${bungo.name}</div>
                    <div class="select-stats">HP: ${bungo.hp} / ATK: ${bungo.atk}</div>
                    <div class="select-ability">⚡ ${bungo.abName}: ${bungo.abDesc}</div>
                `;
                
                btn.onclick = () => { selectCharacter(index); };
                grid.appendChild(btn);
            });
        }

        function selectCharacter(selectedIndex) {
            player = { ...bungoData[selectedIndex] };

            let eIndex = Math.floor(Math.random() * bungoData.length);
            while(eIndex === selectedIndex) {
                eIndex = Math.floor(Math.random() * bungoData.length);
            }
            enemy = { ...bungoData[eIndex] };

            // バトル状態リセット
            playerCorrectCount = 0;
            playerShield = 0;
            isAtsushiTriggered = false;
            isChomeiTriggered = false;

            // 重松清のシールド初期化
            if (player.name === "重松清") {
                playerShield = 40;
            }

            document.getElementById('character-select').style.display = "none";
            document.getElementById('battle-screen').style.display = "flex";

            isGameover = false;
            
            let startLog = `${player.name} VS ${enemy.name} ！ バトル開始！`;
            if (player.name === "重松清") startLog += "<br>【能力発動】『親心のバリア』で耐久40のシールドを展開！";
            
            document.getElementById('log-text').innerHTML = startLog;
            document.getElementById('log-text').style.color = "#00ffcc";
            
            updateDisplay();
            nextTurn();
        }

        function updateDisplay() {
            document.getElementById('p-name').innerText = player.name;
            // シールドがある場合はHP表記に足す
            const hpText = playerShield > 0 ? `${Math.max(0, player.hp)} (+${playerShield})` : Math.max(0, player.hp);
            document.getElementById('p-hp').innerText = hpText;
            document.getElementById('p-atk').innerText = Math.floor(player.atk);
            document.getElementById('p-ability-name').innerText = `⚡ ${player.abName}`;

            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-hp').innerText = Math.max(0, enemy.hp);
            document.getElementById('e-atk').innerText = Math.floor(enemy.atk);
            document.getElementById('e-ability-name').innerText = `⚡ ${enemy.abName}`;
        }

        function nextTurn() {
            if (isGameover) return;

            const quizSource = bungoData[Math.floor(Math.random() * bungoData.length)];
            currentQuizAnswer = quizSource.name;
            document.getElementById('hint-text').innerText = quizSource.hint;

            let choices = [quizSource.name];
            while (choices.length < 4) {
                let randomName = bungoData[Math.floor(Math.random() * bungoData.length)].name;
                if (!choices.includes(randomName)) {
                    choices.push(randomName);
                }
            }
            choices.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = "";
            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = name;
                btn.onclick = () => handleAction(name);
                container.appendChild(btn);
            });
        }

        function handleAction(selectedName) {
            if (isGameover) return;

            const log = document.getElementById('log-text');
            let actionLog = "";
            let abilityLog = "";

            if (selectedName === currentQuizAnswer) {
                // --- 【正解時】プレイヤーの攻撃 ---
                playerCorrectCount++;
                let damage = player.atk;

                // 太宰治：HP半分以下で攻撃力1.5倍
                if (player.name === "太宰治" && player.hp <= (player.maxHp / 2)) {
                    damage = Math.floor(damage * 1.5);
                    abilityLog += "【能力発動】『人間失格』！窮地により攻撃力1.5倍！<br>";
                }

                // 中島敦：最初の1回目のみ攻撃力2倍
                if (player.name === "中島敦" && !isAtsushiTriggered) {
                    damage = damage * 2;
                    isAtsushiTriggered = true;
                    abilityLog += "【能力発動】『月下獣』！猛虎の如き一撃で攻撃力2倍！<br>";
                }

                enemy.hp -= damage;
                actionLog = `⭕正解！ ${player.name} の攻撃！ ${enemy.name} に ${damage} のダメージ！`;

                // 夏目漱石：25%でHP30回復
                if (player.name === "夏目漱石" && Math.random() < 0.25) {
                    player.hp = Math.min(player.maxHp, player.hp + 30);
                    abilityLog += "【能力発動】『月が綺麗ですね』。心が癒やされHPが30回復！<br>";
                }

                // 鴨長明：3回正解で相手のATK半減
                if (player.name === "鴨長明" && playerCorrectCount === 3 && !isChomeiTriggered) {
                    enemy.atk = Math.floor(enemy.atk / 2);
                    isChomeiTriggered = true;
                    abilityLog += "【能力発動】『無常観の押し付け』！世の儚さを説き、敵のATKを永続で半減させた！<br>";
                }

                log.style.color = "#00ffcc";

            } else {
                // --- 【不正解時】敵の反撃 ---
                let enemyDamage = enemy.atk;
                let isEvaded = false;

                // 森鴎外：20%で完全回避
                if (player.name === "森鴎外" && Math.random() < 0.20) {
                    isEvaded = true;
                    abilityLog += "【能力発動】『冷徹な軍医』！敵の攻撃を完全に見切って回避！<br>";
                }

                if (isEvaded) {
                    actionLog = `❌不正解… 正解は ${currentQuizAnswer}。しかし、敵の攻撃を回避した！`;
                } else {
                    // 宮沢賢治：常に5ダメージ軽減
                    if (player.name === "宮沢賢治") {
                        enemyDamage = Math.max(1, enemyDamage - 5);
                        abilityLog += "【能力発動】『雨ニモマケズ』！受けるダメージを5軽減！<br>";
                    }

                    // 重松清：シールド処理
                    if (playerShield > 0) {
                        if (playerShield >= enemyDamage) {
                            playerShield -= enemyDamage;
                            actionLog = `❌不正解… 正解は ${currentQuizAnswer}。敵の反撃！シールドが ${enemyDamage} ダメージを吸収！`;
                        } else {
                            let pierceDamage = enemyDamage - playerShield;
                            playerShield = 0;
                            player.hp -= pierceDamage;
                            actionLog = `❌不正解… 正解は ${currentQuizAnswer}。敵の反撃！シールドが壊れ、本体に ${pierceDamage} のダメージ！`;
                        }
                    } else {
                        player.hp -= enemyDamage;
                        actionLog = `❌不正解… 正解は ${currentQuizAnswer}。敵の反撃！ ${player.name} は ${enemyDamage} のダメージ！`;
                    }

                    // 芥川龍之介：15ドレイン
                    if (player.name === "芥川龍之介") {
                        enemy.hp -= 15;
                        player.hp = Math.min(player.maxHp, player.hp + 15);
                        abilityLog += "【能力発動】『蜘蛛の糸』！地獄の底から敵の命を15吸い取った！<br>";
                    }
                }

                log.style.color = "#ff4d4d";
            }

            // --- ターン終了時処理 ---
            // 鷺沢萠：毎ターン終了時10固定ダメージ
            if (!isGameover && player.name === "鷺沢萠" && enemy.hp > 0 && player.hp > 0) {
                enemy.hp -= 10;
                abilityLog += "【能力発動】『駆ける少年の衝動』！ターン終了時に敵のHPを10削る！<br>";
            }

            // ログの合体表示
            log.innerHTML = (abilityLog !== "" ? abilityLog : "") + actionLog;

            updateDisplay();

            // 勝敗チェック
            if (enemy.hp <= 0) {
                isGameover = true;
                setTimeout(() => {
                    log.innerHTML = `🎉 勝負あり！ ${enemy.name} を撃破した！ あなたの勝利です！`;
                    log.style.color = "#dab358";
                    showResetButton();
                }, 1000);
            } else if (player.hp <= 0) {
                isGameover = true;
                setTimeout(() => {
                    log.innerHTML = `💀 勝負あり！ ${player.name} が倒れた… あなたの敗北です。`;
                    log.style.color = "#ff4d4d";
                    showResetButton();
                }, 1000);
            } else {
                const buttons = document.querySelectorAll('.btn');
                buttons.forEach(b => b.disabled = true);
                setTimeout(nextTurn, 2500); // 演出をじっくり見せるため2.5秒に調整
            }
        }

        function showResetButton() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const resetBtn = document.createElement('button');
            resetBtn.className = "btn";
            resetBtn.style.gridColumn = "span 2";
            resetBtn.style.backgroundColor = "#dab358";
            resetBtn.style.color = "black";
            resetBtn.innerText = "キャラ選択に戻る";
            resetBtn.onclick = function() {
                document.getElementById('battle-screen').style.display = "none";
                document.getElementById('character-select').style.display = "block";
                createSelectScreen();
            };
            container.appendChild(resetBtn);
        }

        createSelectScreen();
    </script>
</body>
</html>
