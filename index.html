<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語便覧 文豪バトルカードゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #dab358;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        /* キャラクター選択画面のスタイル */
        .select-container {
            background-color: #2a2a2a;
            border: 2px solid #dab358;
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .select-card-btn {
            background: linear-gradient(135deg, #3a3a3a, #222);
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .select-card-btn:hover {
            border-color: #dab358;
            transform: translateY(-2px);
        }
        .select-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #dab358;
            margin-bottom: 5px;
        }
        .select-stats {
            font-size: 0.85em;
            color: #ccc;
        }

        /* バトルフィールドのレイアウト */
        .battle-container {
            display: none; /* 最初は非表示 */
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .battle-field {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        /* カードのデザイン */
        .card {
            background: linear-gradient(135deg, #2c2c2c, #111);
            border: 3px solid #dab358;
            border-radius: 10px;
            width: 140px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            position: relative;
        }
        .card.enemy {
            border-color: #c93a3a;
        }
        .card-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat {
            font-size: 1em;
            margin: 5px 0;
            font-weight: bold;
        }
        .hp { color: #ff4d4d; }
        .atk { color: #ffb300; }

        /* クイズエリア */
        .quiz-container {
            background-color: #2a2a2a;
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .hint-box {
            background-color: #222;
            border-left: 5px solid #dab358;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            font-size: 1.1em;
            line-height: 1.5;
            text-align: left;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #dab358;
            color: black;
            border-color: #dab358;
        }
        .log {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
            min-height: 25px;
            color: #00ffcc;
        }
    </style>
</head>

    </div>
